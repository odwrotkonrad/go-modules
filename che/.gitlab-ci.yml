workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

stages:
  - test
  - release

variables:
  GO_VERSION: "1.26.4"
  GOMODCACHE: $CI_PROJECT_DIR/.cache/go-mod
  GOCACHE: $CI_PROJECT_DIR/.cache/go-build
  CC: clang

.go:
  image: golang:1.26-bookworm
  cache:
    - key:
        files:
          - go.sum
      paths:
        - .cache/go-mod
        - .cache/go-build
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends clang make

test:
  extends: .go
  stage: test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - make test

release:
  extends: .go
  stage: release
  rules:
    - if: $CI_COMMIT_TAG
  variables:
    GITLAB_TOKEN: $CI_JOB_TOKEN
  script:
    - go install github.com/goreleaser/goreleaser/v2@latest
    - make release
