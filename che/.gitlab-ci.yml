workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - validate
  - test
  - release

variables:
  CI_IMAGE: registry.gitlab.com/konradodwrot/infra/ci-images/ci-linux:v0.0.1
  GOMODCACHE: $CI_PROJECT_DIR/.cache/go-mod
  GOCACHE: $CI_PROJECT_DIR/.cache/go-build
  CC: clang

validate-pre-commit-all:
  stage: validate
  image: $CI_IMAGE
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - make run-repo-ci-precommit-all
    - git diff --exit-code HEAD

test:
  image: $CI_IMAGE
  stage: test
  needs: []
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  cache:
    - key:
        files:
          - go.sum
      paths:
        - .cache/go-mod
        - .cache/go-build
  script:
    - make test

release:
  stage: release
  image: $CI_IMAGE
  needs: []
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  variables:
    GITLAB_TOKEN: $CI_JOB_TOKEN
  script:
    - make create-tag BRANCH="$CI_COMMIT_BRANCH" REF="$CI_COMMIT_SHA" DEFAULT_BRANCH="$CI_DEFAULT_BRANCH"

goreleaser-darwin:
  stage: release
  needs: []
  tags:
    - saas-macos-medium-m1
  image: macos-26-xcode-26
  rules:
    - if: $CI_COMMIT_TAG
  before_script:
    - brew install go goreleaser/tap/goreleaser
  script:
    - goreleaser release --clean -f .goreleaser.darwin.yaml
  artifacts:
    paths:
      - darwin-dist/*.tar.gz
    expire_in: 1 day

goreleaser:
  stage: release
  image: $CI_IMAGE
  needs:
    - goreleaser-darwin
  rules:
    - if: $CI_COMMIT_TAG
  variables:
    GITLAB_TOKEN: $CI_JOB_TOKEN
  cache:
    - key:
        files:
          - go.sum
      paths:
        - .cache/go-mod
        - .cache/go-build
  script:
    - goreleaser release --clean -f .goreleaser.yaml
