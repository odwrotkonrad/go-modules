workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - validate
  - test
  - release

variables:
  GOMODCACHE: $CI_PROJECT_DIR/.cache/go-mod
  GOCACHE: $CI_PROJECT_DIR/.cache/go-build
  CC: clang

validate-pre-commit-all:
  stage: validate
  image: golang:1.26-bookworm
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends clang make zsh
    - go install gitlab.com/konradodwrot/go/che@latest
    - go install github.com/evilmartians/lefthook@latest
    - mkdir -p ~/.config/lefthook
    - '[ -f ~/.config/lefthook/lefthook.yml ] || printf "min_version: 2.1.9\n" > ~/.config/lefthook/lefthook.yml'
  script:
    - make run-repo-ci-precommit-all
    - git diff --exit-code HEAD

test:
  image: golang:1.26-bookworm
  stage: test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  cache:
    - key:
        files:
          - go.sum
      paths:
        - .cache/go-mod
        - .cache/go-build
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends clang make zsh
  script:
    - make test

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs: []
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - apk add --no-cache make zsh
  script:
    - make create-tag BRANCH="$CI_COMMIT_BRANCH" REF="$CI_COMMIT_SHA" DEFAULT_BRANCH="$CI_DEFAULT_BRANCH"

prerelease:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs: [test]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TITLE =~ /^Draft:/
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  before_script:
    - apk add --no-cache make zsh
  script:
    - make create-tag BRANCH="$CI_COMMIT_REF_NAME" REF="$CI_COMMIT_SHA" DEFAULT_BRANCH="$CI_DEFAULT_BRANCH"

goreleaser-darwin:
  stage: release
  needs: []
  tags:
    - saas-macos-medium-m1
  image: macos-26-xcode-26
  rules:
    - if: $CI_COMMIT_TAG
  before_script:
    - brew install go goreleaser/tap/goreleaser
  script:
    - goreleaser release --clean -f .goreleaser.darwin.yaml
  artifacts:
    paths:
      - darwin-dist/*.tar.gz
    expire_in: 1 day

goreleaser:
  stage: release
  image: golang:1.26-bookworm
  needs:
    - goreleaser-darwin
  rules:
    - if: $CI_COMMIT_TAG
  cache:
    - key:
        files:
          - go.sum
      paths:
        - .cache/go-mod
        - .cache/go-build
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git make xz-utils
    - "curl -fsSL https://ziglang.org/download/0.16.0/zig-x86_64-linux-0.16.0.tar.xz | tar -xJ -C /usr/local"
    - "ln -sf /usr/local/zig-x86_64-linux-0.16.0/zig /usr/local/bin/zig"
    - "curl -fsSL https://github.com/goreleaser/goreleaser/releases/download/v2.16.0/goreleaser_Linux_x86_64.tar.gz | tar -xz -C /usr/local/bin goreleaser"
  script:
    - goreleaser release --clean -f .goreleaser.yaml
