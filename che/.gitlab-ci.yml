workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - validate
  - test
  - release

variables:
  CI_IMAGE: registry.gitlab.com/konradodwrot/infra/oci-images/ci-linux:latest
  GOMODCACHE: $CI_PROJECT_DIR/.cache/go-mod
  GOCACHE: $CI_PROJECT_DIR/.cache/go-build
  CC: clang

validate-pre-commit-all:
  stage: validate
  image: $CI_IMAGE
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - make run-repo-ci-precommit-all
    - git diff --exit-code HEAD

test:
  image: $CI_IMAGE
  stage: test
  needs: []
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  cache:
    - key:
        files:
          - go.sum
      paths:
        - .cache/go-mod
        - .cache/go-build
  script:
    - make test

release:
  stage: release
  image: $CI_IMAGE
  needs: []
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  variables:
    GITLAB_TOKEN: $CI_JOB_TOKEN
  script:
    - make create-tag BRANCH="$CI_COMMIT_BRANCH" REF="$CI_COMMIT_SHA" DEFAULT_BRANCH="$CI_DEFAULT_BRANCH"

goreleaser-darwin:
  stage: release
  needs: []
  tags:
    - saas-macos-medium-m1
  image: macos-26-xcode-26
  rules:
    - if: $CI_COMMIT_TAG
  variables:
    GO_VERSION: 1.26.4
    GO_SHA256_DARWIN_ARM64: b62ad2b6d7d2464f12a5bcad7ff47f19d08325773b5efd21610e445a05a9bf53
    GORELEASER_VERSION: 2.16.0
    GORELEASER_SHA256_DARWIN_ARM64: 8f6898256f35531165d90f2db581c5ee0d32bda83ebc25ac231ff5bdb9d2071a
  cache:
    - key:
        files:
          - go.sum
        prefix: darwin
      paths:
        - .cache/go-mod
        - .cache/go-build
  before_script:
    - curl -fsSL -o /tmp/go.tar.gz "https://go.dev/dl/go${GO_VERSION}.darwin-arm64.tar.gz"
    - echo "$GO_SHA256_DARWIN_ARM64  /tmp/go.tar.gz" | shasum -a 256 -c -
    - tar -C "$HOME" -xzf /tmp/go.tar.gz
    - curl -fsSL -o /tmp/goreleaser.tar.gz "https://github.com/goreleaser/goreleaser/releases/download/v${GORELEASER_VERSION}/goreleaser_Darwin_arm64.tar.gz"
    - echo "$GORELEASER_SHA256_DARWIN_ARM64  /tmp/goreleaser.tar.gz" | shasum -a 256 -c -
    - mkdir -p "$HOME/bin"
    - tar -C "$HOME/bin" -xzf /tmp/goreleaser.tar.gz goreleaser
    - export PATH="$HOME/go/bin:$HOME/bin:$PATH"
    - go version
    - goreleaser --version
  script:
    - goreleaser release --clean -f .goreleaser.darwin.yaml
  artifacts:
    paths:
      - darwin-dist/*.tar.gz
    expire_in: 1 day

goreleaser:
  stage: release
  image: $CI_IMAGE
  needs:
    - goreleaser-darwin
  rules:
    - if: $CI_COMMIT_TAG
  variables:
    GITLAB_TOKEN: $CI_JOB_TOKEN
  cache:
    - key:
        files:
          - go.sum
      paths:
        - .cache/go-mod
        - .cache/go-build
      policy: pull
  script:
    - goreleaser release --clean -f .goreleaser.yaml
