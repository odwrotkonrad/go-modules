version: 2

project_name: che

dist: darwin-dist

snapshot:
  version_template: '{{ envOrDefault "MODULE_VERSION" "0.0.0-local" }}'

builds:
  - id: che-darwin
    main: .
    binary: che
    goos: [darwin]
    goarch: [amd64, arm64]
    flags:
      - -trimpath
    ldflags:
      - -s -w -X gitlab.com/konradodwrot/go-modules/che/internal/cli.version={{.Version}}
    env:
      - CGO_ENABLED=1
      - CC=cc
      - CXX=c++

  - id: render-tpl-darwin
    main: ./render/cmd/render-tpl
    binary: render-tpl
    goos: [darwin]
    goarch: [amd64, arm64]
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=1
      - CC=cc
      - CXX=c++

  - id: render-dirs-tree-darwin
    main: ./render/cmd/render-dirs-tree
    binary: render-dirs-tree
    goos: [darwin]
    goarch: [amd64, arm64]
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=1
      - CC=cc
      - CXX=c++

  - id: render-makefile-doc-darwin
    main: ./render/cmd/render-makefile-doc
    binary: render-makefile-doc
    goos: [darwin]
    goarch: [amd64, arm64]
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=1
      - CC=cc
      - CXX=c++

  - id: render-repo-group-index-darwin
    main: ./render/cmd/render-repo-group-index
    binary: render-repo-group-index
    goos: [darwin]
    goarch: [amd64, arm64]
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=1
      - CC=cc
      - CXX=c++

archives:
  - id: che
    ids: [che-darwin, render-tpl-darwin, render-dirs-tree-darwin, render-makefile-doc-darwin, render-repo-group-index-darwin]
    formats: [tar.gz]
    name_template: 'che_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
  - id: render-tpl
    ids: [render-tpl-darwin]
    formats: [tar.gz]
    name_template: 'render-tpl_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
  - id: render-dirs-tree
    ids: [render-dirs-tree-darwin]
    formats: [tar.gz]
    name_template: 'render-dirs-tree_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
  - id: render-makefile-doc
    ids: [render-makefile-doc-darwin]
    formats: [tar.gz]
    name_template: 'render-makefile-doc_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
  - id: render-repo-group-index
    ids: [render-repo-group-index-darwin]
    formats: [tar.gz]
    name_template: 'render-repo-group-index_{{ .Version }}_{{ .Os }}_{{ .Arch }}'

release:
  disable: true
