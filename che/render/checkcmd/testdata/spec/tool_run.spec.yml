# [>] 🤖🤖
- name: help_short
  in:
    args: ["-h"]
  want:
    exitCode: 0
- name: help_long
  in:
    args: ["--help"]
  want:
    exitCode: 0
- name: no_arg_emit
  in:
    args: []
  want:
    exitCode: 0
- name: no_arg_rejects_positional
  in:
    args: ["x"]
  want:
    exitCode: 11
- name: needs_arg_emit
  in:
    needsArg: true
    args: ["x"]
  want:
    exitCode: 0
- name: needs_arg_rejects_empty
  in:
    needsArg: true
    args: []
  want:
    exitCode: 11
- name: needs_arg_rejects_flag
  in:
    needsArg: true
    args: ["-x"]
  want:
    exitCode: 11
- name: unknown_flag
  in:
    args: ["--nope", "y"]
  want:
    exitCode: 11
# [<] 🤖🤖
