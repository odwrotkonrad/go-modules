- name: renderMarkdownShouldApplyAllTransforms
  in:
    args: [p.md, remove-frontmatter, strip-comments, normalize-headings]
  want:
    filesOut: testdata/fixture/render_markdown/all_opts.expected.md
- name: renderMarkdownShouldKeepFrontmatterWhenNotRemoved
  in:
    args: [p.md, strip-comments]
  want:
    filesOut: testdata/fixture/render_markdown/keep_frontmatter.expected.md
- name: renderMarkdownShouldErrorOnUnknownOption
  in:
    args: [p.md, bogus]
  want:
    error: true
