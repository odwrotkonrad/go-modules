# [>] 🤖🤖
- name: isAtIncludeShouldAcceptTildePath
  in:
    args: ["@~/.config/x"]
  want: true
- name: isAtIncludeShouldAcceptRelativePath
  in:
    args: ["@path/to/file"]
  want: true
- name: isAtIncludeShouldRejectSpaceAfterAt
  in:
    args: ["@ has space"]
  want: false
- name: isAtIncludeShouldRejectMidLineAt
  in:
    args: ["text @middle"]
  want: false
- name: isAtIncludeShouldRejectPlainText
  in:
    args: [plain]
  want: false
- name: isAtIncludeShouldRejectBareAt
  in:
    args: ["@"]
  want: false
# [<] 🤖🤖
