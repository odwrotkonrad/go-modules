context:
  function: render.IsSecretRefPresent
cases:
  - name: ShouldDetectOpRef
    input:
      args: [body: "token = {{ secret \"op://vault/item/field\" }}"]
    expected:
      output: true
  - name: ShouldDetectGCPRef
    input:
      args: [body: "token = {{ secret \"gcp://project_main/my-secret/latest\" }}"]
    expected:
      output: true
  - name: ShouldDetectMixedSchemes
    input:
      args: [body: "a = op://vault/item/field\nb = gcp://project_main/my-secret"]
    expected:
      output: true
  - name: ShouldRejectPlainBody
    input:
      args: [body: "plain text, no secrets here"]
    expected:
      output: false
