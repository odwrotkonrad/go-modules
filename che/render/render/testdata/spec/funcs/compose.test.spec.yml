# [>] 🤖🤖
context:
  function: render.Compose
cases:
  - name: ShouldPrefixAutogenHeader
    input:
      args:
        - body: "hello\n"
        - headerDest: out.md
        - tmplName: t.ontoRepo.tpl
    expected:
      output: "<!-- autogenerated using t.ontoRepo.tpl -->\nhello\n"
  - name: ShouldInlineAtIncludes
    input:
      args:
        - body: "@inc.md\n"
        - headerDest: AGENTS.md
        - tmplName: a.ontoRepo.tpl
        - opts: {renderReferencedFiles: true}
        - existing: ""
        - files:
            inc.md: "INLINED\n"
    expected:
      output: "<!-- autogenerated using a.ontoRepo.tpl -->\nINLINED\n"
  - name: ShouldMergeUpsertUnderExisting
    input:
      args:
        - body: "A=default\nB=default\n"
        - headerDest: ""
        - tmplName: ""
        - opts: {writeType: mergeUpsert}
        - existing: "B=kept\n"
    expected:
      output: "A=default\nB=kept\n"
  - name: ShouldSkipAutoGeneratedHeader
    input:
      args:
        - body: "-----BEGIN OPENSSH PRIVATE KEY-----\nabc\n-----END OPENSSH PRIVATE KEY-----\n"
        - headerDest: /home/ko/.ssh/id_access
        - tmplName: id_access.ontoHost.tpl
        - opts: {skipAutoGeneratedHeader: true}
    expected:
      output: "-----BEGIN OPENSSH PRIVATE KEY-----\nabc\n-----END OPENSSH PRIVATE KEY-----\n"
  - name: ShouldSkipHeaderWithAtInclude
    input:
      args:
        - body: "@inc.md\n"
        - headerDest: AGENTS.md
        - tmplName: a.ontoRepo.tpl
        - opts: {skipAutoGeneratedHeader: true, renderReferencedFiles: true}
        - existing: ""
        - files:
            inc.md: "INLINED\n"
    expected:
      output: "INLINED\n"
# [<] 🤖🤖
