# [>] 🤖🤖
context:
  function: render.secretFunc
  env: {OP_SERVICE_ACCOUNT_TOKEN: tok}
  mockedInterfaces:
    render.secretResolver: render.SecretMockResolver
cases:
  - name: ShouldErrorOnUnknownScheme
    input:
      args: [ref: vault/item/field]
    expected:
      errorOutput: ['unknown scheme']
      output: {opCalls: 0, gcpCalls: 0, opFactoryCalls: 0, gcpFactoryCalls: 0}
  - name: ShouldErrorWhenOpTokenUnsetOnlyForOpRef
    context:
      env: {OP_SERVICE_ACCOUNT_TOKEN: ""}
    input:
      args: [ref: op://vault/item/field]
    expected:
      errorOutput: ['OP_SERVICE_ACCOUNT_TOKEN unset']
      output: {opCalls: 0, gcpCalls: 0, opFactoryCalls: 1, gcpFactoryCalls: 0}
  - name: ShouldNotRequireOpTokenForGCPRef
    context:
      env: {OP_SERVICE_ACCOUNT_TOKEN: ""}
    input:
      args: [ref: gcp://project_main/my-secret/latest, secret: g3cret]
    expected:
      output: {value: g3cret, gcpCalls: 1, gcpFactoryCalls: 1}
  - name: ShouldSurfaceOpClientInitError
    input:
      args: [ref: op://vault/item/field, secret: "", failTimes: 0, failMsg: "", clientFail: true]
    expected:
      errorOutput: ['secret "op://vault/item/field"']
      output: {opCalls: 0, opFactoryCalls: 1}
  - name: ShouldResolveOpSecret
    input:
      args: [ref: op://vault/item/field, secret: s3cret]
    expected:
      output: {value: s3cret, opCalls: 1, opFactoryCalls: 1}
  - name: ShouldResolveGCPSecretDefaultVersion
    input:
      args: [ref: gcp://project_main/my-secret, secret: g3cret]
    expected:
      output: {value: g3cret, gcpCalls: 1, gcpFactoryCalls: 1}
  - name: ShouldResolveGCPSecretExplicitVersion
    input:
      args: [ref: gcp://project_main/my-secret/3, secret: g3cret]
    expected:
      output: {value: g3cret, gcpCalls: 1, gcpFactoryCalls: 1}
  - name: ShouldRetryRateLimitThenResolve
    input:
      args: [ref: op://vault/item/field, secret: s3cret, failTimes: 1, failMsg: rate limit exceeded]
    expected:
      output: {value: s3cret, opCalls: 2, opFactoryCalls: 1}
  - name: ShouldSurfaceNonRetryableError
    input:
      args: [ref: op://vault/item/field, secret: "", failTimes: 1, failMsg: secret not found]
    expected:
      errorOutput: ['secret resolve "op://vault/item/field"', 'secret not found']
      output: {opCalls: 1, opFactoryCalls: 1}
  - name: ShouldReuseBackendAcrossRefs
    input:
      args: [ref: op://vault/item/field, secret: s3cret, failTimes: 0, failMsg: "", clientFail: false, resolveTwice: true]
    expected:
      output: {value: s3cret, opCalls: 2, opFactoryCalls: 1}
# [<] 🤖🤖
