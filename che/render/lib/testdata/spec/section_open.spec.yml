- name: sectionOpenShouldParseGenaiIncludeLabel
  in:
    args: ["##[>] Onto Host [genai-include]"]
  want:
    label: Onto Host
    depth: 0
    ok: true
- name: sectionOpenShouldKeepParensAndStripMarks
  in:
    args: ["##[>] Onto Repo (CI) [genai-include] 🤖🤖"]
  want:
    label: Onto Repo (CI)
    depth: 0
    ok: true
- name: sectionOpenShouldComputeNestedDepth
  in:
    args: ["###[>] VM"]
  want:
    label: VM
    depth: 1
    ok: true
- name: sectionOpenShouldStripTrailingMarks
  in:
    args: ["##[>] go 🤖🤖"]
  want:
    label: go
    depth: 0
    ok: true
- name: sectionOpenShouldRejectWhatComment
  in:
    args: ["#[what] not a section"]
  want:
    label: ""
    depth: 0
    ok: false
