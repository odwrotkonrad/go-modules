# [>] 🤖🤖
context:
  function: lib.sectionOpen
cases:
  - name: sectionOpenShouldParseGenaiIncludeLabel
    input:
      args: [line: "##[>] Onto Host [genai-include]"]
    expected:
      output: {label: Onto Host, depth: 0, ok: true}
  - name: sectionOpenShouldKeepParensAndStripMarks
    input:
      args: [line: "##[>] Onto Repo (CI) [genai-include] 🤖🤖"]
    expected:
      output: {label: Onto Repo (CI), depth: 0, ok: true}
  - name: sectionOpenShouldComputeNestedDepth
    input:
      args: [line: "###[>] VM"]
    expected:
      output: {label: VM, depth: 1, ok: true}
  - name: sectionOpenShouldStripTrailingMarks
    input:
      args: [line: "##[>] go 🤖🤖"]
    expected:
      output: {label: go, depth: 0, ok: true}
  - name: sectionOpenShouldRejectWhatComment
    input:
      args: [line: "#[what] not a section"]
    expected:
      output: {label: "", depth: 0, ok: false}
# [<] 🤖🤖
