base:
  include:
    makeLinks:
      - etc/zshrc
      - HOME/.config/zsh/**
      - etc/grafana/**
    makeCopies:
      - chmod: "0600"
        files: [Library/LaunchDaemons/**]
    makeDirs:
      - directories: [HOME/.cache/zsh]
      - chmod: "2775"
        directories:
          - {dest: [/var/log/grafana]}
    runScripts:
      - ci/zsh/scripts/installs/10-brew.zsh
      - ci/zsh/scripts/installs/20-kitty.zsh
    runServices: [otelcol, port-exporter, grafana, prometheus]

base-exclude-desktop:
  exclude:
    makeLinks:
      - etc/grafana/**
    makeDirs:
      - /var/log/grafana
    runScripts:
      - ci/zsh/scripts/installs/20-kitty.zsh
    runServices: [grafana, prometheus]

desktop/macos:
  options: {autoDiscover: true}
  include:
    profiles: [base]

cli/macos:
  options: {autoDiscover: true}
  include:
    profiles: [base, base-exclude-desktop]
