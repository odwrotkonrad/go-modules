base:
  include:
    renderTemplates:
      - files:
          - source: "@gitlab.com/acme/tools//snippets/agent.md"
            ctx: {repo: Notes}
            dest:
              - {path: .claude/agents/ro.md, options: {skipAutoGeneratedHeader: true}}

cli/macos:
  options: {autoExec: true}
  mixinProfiles: [base]
