repo:
  options: {autoDiscover: true}
  include:
    renderTemplates:
      - files:
          - source: templates/1-env/local.env.ontoRepo.tpl
            dest:
              - {path: .env, options: {writeType: mergeUpsert}}
other:
  options: {autoDiscover: true}
  include:
    renderTemplates:
      - files:
          - source: templates/1-env/local.env.ontoRepo.tpl
            dest:
              - {path: .env2, options: {writeType: mergeUpsert}}
both:
  include:
    profiles: [repo, other]
