base:
  include:
    makeLinks:
      - etc/zshrc
      - {source: HOME/.config/foo/**, dest: s/foo/bar/}

cli/macos:
  options: {autoDiscover: true}
  include:
    profiles: [base]

exclude-rewritten:
  include:
    profiles: [base]
  exclude:
    makeLinks:
      - HOME/.config/bar/b
