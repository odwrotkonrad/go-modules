base:
  include:
    renderTemplates:
      - options: {skipAutoGeneratedHeader: true}
        files:
          - source: "@gitlab.com/acme/tools//snippets/ro.md"
            dest:
              - {path: .claude/agents/ro.md}
          - source: "@gitlab.com/acme/tools//snippets/settings.json"
            dest:
              - {path: .claude/settings.json, options: {renderReferencedFiles: true}}
          - source: "@gitlab.com/acme/tools//snippets/gitignore"
            dest:
              - {path: .claude/.gitignore, options: {skipAutoGeneratedHeader: false}}

cli/macos:
  options: {autoDiscover: true}
  include:
    profiles: [base]
