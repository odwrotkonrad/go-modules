base:
  options: {mixinOnly: true}
  include:
    link:
      - HOME/.config/zsh/**
      - HOME/.config/git/**
      - etc/zshrc
      - etc/zsh/**
    copy:
      - files: [HOME/.config/zsh/**, Library/LaunchDaemons/otelcol.plist*]
    template:
      - files: [HOME/.config/zsh/**]

cli/macos:
  options: {autoDetect: true}
  mixinProfiles: [base]

desktop/macos:
  options: {autoDetect: true}
  mixinProfiles: [base]
