base:
  include:
    makeLinks:
      - HOME/.config/zsh/**
      - HOME/.config/git/**
      - etc/zshrc
      - etc/zsh/**
    makeCopies:
      - files: [HOME/.config/zsh/**, Library/LaunchDaemons/otelcol.plist*]
    renderTemplates:
      - templates: [root/HOME/.config/zsh/**]

cli/macos:
  options: {autoDiscover: true}
  include:
    profiles: [base]

desktop/macos:
  options: {autoDiscover: true}
  include:
    profiles: [base]
