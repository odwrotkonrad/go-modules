base:
  include:
    makeLinks:
      - _home/.config/zsh/**
      - _home/.config/git/**
      - etc/zshrc
      - etc/zsh/**
    makeCopies:
      - files: [_home/.config/zsh/**, Library/LaunchDaemons/otelcol.plist*]
    renderTemplates:
      - templates: [_home/.config/zsh/**]

cli/macos:
  options: {autoDiscover: true}
  include:
    profiles: [base]

desktop/macos:
  options: {autoDiscover: true}
  include:
    profiles: [base]
