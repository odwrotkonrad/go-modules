base:
  options: {mixinOnly: true}
  include:
    link:
      - etc/zshrc
      - etc/zsh/**
      - HOME/.config/extra/**
      - HOME/.config/oneoff/**
    copy:
      - files:
          - {source: HOME/.config/zsh/c.host.cp, dest: [~/.config/zsh/c]}
    runScripts:
      - ci/zsh/scripts/installs/10-brew.zsh
      - ci/zsh/scripts/installs/20-foo.zsh
    services: [otelcol, grafana]

cli/macos:
  mixinProfiles: [base]
  exclude:
    link:
      - etc/zsh/**
    copy:
      - HOME/.config/zsh/c.host.cp
    runScripts:
      - ci/zsh/scripts/installs/20-foo.zsh
    services: [graf*]
