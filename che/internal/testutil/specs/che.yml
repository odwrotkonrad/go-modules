base:
  include:
    makeLinks:
      - {source: HOME/.config/zsh/**, dest: 's#^HOME#$HOME#'}
      - etc/zshrc
    makeCopies:
      - files: [{source: HOME/.config/zsh/**, dest: 's#^HOME#$HOME#'}]
      - owner: root
        ownerGroup: wheel
        chmod: "0644"
        files:
          - {source: Library/LaunchDaemons/otelcol.plist.ontoHost.cp, dest: [/Library/LaunchDaemons/otelcol.plist]}
    renderTemplates:
      - templates: [{source: HOME/.config/zsh/**, dest: 's#^HOME#$HOME#'}]
    makeDirs:
      - directories: [$HOME/.cache/zsh]
      - chmod: "2775"
        directories:
          - {dest: [/var/log/che-test-setgid]}
    runScripts:
      - install/setup
    runServices: [otelcol]

cli/macos:
  options: {autoDiscover: true, execIf: ['builtin:isOs == macos', 'builtin:isVirt']}
  include:
    profiles: [base]

desktop/macos:
  options: {autoDiscover: true, execIf: ['builtin:isOs == macos', 'builtin:isVirt == false']}
  include:
    profiles: [base]

ontoRepo:
  include:
    renderTemplates:
      - templates:
          - source: templates/r.ontoRepo.tpl
            dest: [docs/r.md]
