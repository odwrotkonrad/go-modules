base:
  options: {mixinOnly: true}
  include:
    link:
      - HOME/.config/zsh/**
      - etc/zshrc
    copy:
      - files: [HOME/.config/zsh/**]
      - owner: root
        ownerGroup: wheel
        chmod: "0644"
        files:
          - {source: Library/LaunchDaemons/otelcol.plist.host.cp, dest: [/Library/LaunchDaemons/otelcol.plist]}
    template:
      - files: [HOME/.config/zsh/**]
    repoTemplate:
      - files:
          - source: templates/r.repo.tpl
            dest: [docs/r.md]
    mkdirs:
      - files: [HOME/.cache/zsh]
      - chmod: "2775"
        files:
          - {dest: [/var/log/che-test-setgid]}
    runScripts:
      - install/unit
    services: [otelcol]

cli/macos:
  options: {onlyIf: ['builtin:isOs == macos', 'builtin:isVirt']}
  mixinProfiles: [base]

desktop/macos:
  options: {onlyIf: ['builtin:isOs == macos', 'builtin:isVirt == false']}
  mixinProfiles: [base]
