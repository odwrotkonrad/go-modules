context:
  function: source.EnsureCheckout
cases:
  - name: ShouldCloneIntoCacheDirAndLogClonedOnFirstEnsure
    input:
      args: [priorEnsures: 0, commitExtra: false]
    expected:
      output: {files: [che.yml]}
      stdOut: ["init-remote-sources(cloneRemote): ${URL} -> ${DIR}"]
    notExpected:
      stdOut: ["clone ${URL}"]
  - name: ShouldLogNoopOnNoChangePull
    input:
      args: [priorEnsures: 1, commitExtra: false]
    expected:
      stdOut: ['init-remote-sources(update, skippedDue[RemoteUpToDate]): ${URL} -> ${DIR}']
  - name: ShouldWarnAndUseCacheWhenFetchFails
    input:
      args: [priorEnsures: 1, commitExtra: false, debug: false, upstreamGone: true]
    expected:
      stdOut: ['using cached checkout ${DIR}']
  - name: ShouldHardResetAndLogPulledOnUpstreamChange
    input:
      args: [priorEnsures: 1, commitExtra: true]
    expected:
      output: {files: [extra.txt]}
      stdOut: ['init-remote-sources(updateRemote): ${URL} -> ${DIR}']
    notExpected:
      stdOut: ["pull ${DIR}"]
# [<] 🤖🤖
