context:
  function: spec.EligibleRecipes
cases:
  - name: ShouldSelectProfileWithPassingExecIf
    input:
      args: [spec: che, os: macos, virt: true]
    expected:
      output: [cli/macos]
  - name: ShouldErrorWhenNoProfileEligible
    input:
      args: [spec: che, os: linux, virt: true]
    expected:
      errorOutput: ['no eligible profile: no autoDiscover profile passed its runIf']
  - name: ShouldStillEnforceExecIfWhenForcingOneProfile
    input:
      args: [spec: che, os: linux, virt: true, forced: [desktop/macos]]
    expected:
      errorOutput: ['--profiles "desktop/macos" failed its runIf predicates']
  - name: ShouldLiftExecIfWhenForcingOneWithForceAll
    input:
      args: [spec: che, os: linux, virt: true, forced: [desktop/macos], forceAll: true]
    expected:
      output: [desktop/macos]
  - name: ShouldSelectForcedProfileWhenExecIfPasses
    input:
      args: [spec: che, os: macos, virt: false, forced: [desktop/macos]]
    expected:
      output: [desktop/macos]
  - name: ShouldSelectMultipleForcedProfilesInGivenOrder
    input:
      args: [spec: che, os: linux, virt: true, forced: [base, ontoRepo]]
    expected:
      output: [base, ontoRepo]
  - name: ShouldSelectForcedNonAutoDiscoverBaseProfile
    input:
      args: [spec: che, os: linux, virt: true, forced: [base]]
    expected:
      output: [base]
  - name: ShouldSelectForcedNonAutoDiscoverOntoRepoProfile
    input:
      args: [spec: che, os: linux, virt: true, forced: [ontoRepo]]
    expected:
      output: [ontoRepo]
  - name: ShouldErrorOnUndefinedForcedProfile
    input:
      args: [spec: che, os: macos, virt: true, forced: [cli/linux]]
    expected:
      errorOutput: ['--profiles "cli/linux" is not defined in che.yml']
  - name: ShouldSelectAllAutoDiscoverProfilesWithForceAll
    input:
      args: [spec: che, os: linux, virt: true, forced: [], forceAll: true]
    expected:
      output: [cli/macos, desktop/macos]
  - name: ShouldAlwaysSelectLonePlainProfile
    input:
      args: [spec: repo, os: linux, virt: true]
    expected:
      output: [repo]
  - name: ShouldUnionInDeclarationOrder
    input:
      args: [spec: ambiguous, os: linux, virt: true]
    expected:
      output: [repo, other]
# [<] 🤖🤖
