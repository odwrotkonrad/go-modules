context:
  function: spec.AllPass
cases:
  - name: ShouldRejectSilentlyOnEmptyEnvAtInfoLevel
    context:
      env: {X: ""}
    input:
      args: [profile: p, trace: false]
    expected:
      output: false
    notExpected:
      stdOut: ["evaluated run if"]
  - name: ShouldLogRejectAtTraceLevel
    context:
      env: {X: ""}
    input:
      args: [profile: p, trace: true]
    expected:
      output: false
      stdOut: ['evaluated run if p: "env:X" failed']
  - name: ShouldPassSilentlyOnSetEnvAtInfoLevel
    context:
      env: {X: "1"}
    input:
      args: [profile: p, trace: false]
    expected:
      output: true
    notExpected:
      stdOut: ["evaluated run if"]
  - name: ShouldPassAndLogOnSetEnvAtTraceLevel
    context:
      env: {X: "1"}
    input:
      args: [profile: p, trace: true]
    expected:
      output: true
      stdOut: ['evaluated run if p: "env:X" passed']
  - name: ShouldErrorOnUndefinedProfile
    input:
      args: [profile: nope, trace: false]
    expected:
      errorOutput: ['profile "nope" is not defined in che.yml']
# [<] 🤖🤖
