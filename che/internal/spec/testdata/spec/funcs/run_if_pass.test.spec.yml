context:
  function: spec.AllPass
cases:
  - name: ShouldRejectSilentlyOnEmptyEnvAtNormalLevel
    context:
      env: {X: ""}
    input:
      args: [profile: p, debug: false]
    expected:
      output: false
    notExpected:
      stdOut: ["noPass"]
  - name: ShouldLogRejectAtDebugLevel
    context:
      env: {X: ""}
    input:
      args: [profile: p, debug: true]
    expected:
      output: false
      stdOut: ["debug discover-profiles(evaluating[p], noPass): env:X"]
  - name: ShouldPassSilentlyOnSetEnvAtNormalLevel
    context:
      env: {X: "1"}
    input:
      args: [profile: p, debug: false]
    expected:
      output: true
    notExpected:
      stdOut: ["evaluating["]
  - name: ShouldPassAndLogOnSetEnvAtDebugLevel
    context:
      env: {X: "1"}
    input:
      args: [profile: p, debug: true]
    expected:
      output: true
      stdOut: ["debug discover-profiles(evaluating[p], pass): env:X"]
  - name: ShouldErrorOnUndefinedProfile
    input:
      args: [profile: nope, debug: false]
    expected:
      errorOutput: ['profile "nope" is not defined in che.yml']
