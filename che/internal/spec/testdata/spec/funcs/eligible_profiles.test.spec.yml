context:
  function: spec.Raw.EligibleProfiles
cases:
  - name: ShouldSelectProfileWithPassingExecIf
    input:
      args: [spec: che, os: macos, virt: true]
    expected:
      output: [cli/macos]
  - name: ShouldErrorWhenNoProfileEligible
    input:
      args: [spec: che, os: linux, virt: true]
    expected:
      errorOutput: ['no eligible profile: no autoExec profile passed its execIf']
  - name: ShouldStillEnforceExecIfWhenForcingOneProfile
    input:
      args: [spec: che, os: linux, virt: true, forceOne: desktop/macos]
    expected:
      errorOutput: ['--profile "desktop/macos" failed its execIf predicates']
  - name: ShouldLiftExecIfWhenForcingOneWithForceAll
    input:
      args: [spec: che, os: linux, virt: true, forceOne: desktop/macos, forceAll: true]
    expected:
      output: [desktop/macos]
  - name: ShouldSelectForcedProfileWhenExecIfPasses
    input:
      args: [spec: che, os: macos, virt: false, forceOne: desktop/macos]
    expected:
      output: [desktop/macos]
  - name: ShouldSelectForcedNonAutoexecBaseProfile
    input:
      args: [spec: che, os: linux, virt: true, forceOne: base]
    expected:
      output: [base]
  - name: ShouldSelectForcedNonAutoexecOntoRepoProfile
    input:
      args: [spec: che, os: linux, virt: true, forceOne: ontoRepo]
    expected:
      output: [ontoRepo]
  - name: ShouldErrorOnUndefinedForcedProfile
    input:
      args: [spec: che, os: macos, virt: true, forceOne: cli/linux]
    expected:
      errorOutput: ['--profile "cli/linux" is not defined in che.yml']
  - name: ShouldSelectAllAutoexecProfilesWithForceAll
    input:
      args: [spec: che, os: linux, virt: true, forceOne: "", forceAll: true]
    expected:
      output: [cli/macos, desktop/macos]
  - name: ShouldAlwaysSelectLonePlainProfile
    input:
      args: [spec: repo, os: linux, virt: true]
    expected:
      output: [repo]
  - name: ShouldUnionInDeclarationOrder
    input:
      args: [spec: ambiguous, os: linux, virt: true]
    expected:
      output: [repo, other]
# [<] 🤖🤖
