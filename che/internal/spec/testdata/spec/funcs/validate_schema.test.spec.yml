# [>] 🤖🤖
context:
  function: spec.ValidateSchema
cases:
  - name: ShouldAcceptEveryTestutilFixture
    input:
      args: [fixturesGlob: ../testutil/specs/*.yml]
    expected:
      output: ""
  - name: ShouldReturnNoFindingsForUnparseableYAML
    input:
      args: [doc: "p: ["]
    expected:
      output: ""
  - name: ShouldAnchorRootViolationAtSlash
    input:
      args: [doc: "- a\n- b\n"]
    expected:
      output: '{{/^/: /}}'
  - name: ShouldFlagExtraKey
    input:
      args:
        - doc: |
            p:
              includes:
                makeLinks: [_home/**]
    expected:
      output: includes
  - name: ShouldFlagLinkEntryWithoutDest
    input:
      args:
        - doc: |
            p:
              include:
                makeLinks: [{source: _home/.config/foo/a}]
    expected:
      output: dest
  - name: ShouldAcceptLinkEntryWithExplicitDests
    input:
      args:
        - doc: |
            p:
              include:
                makeLinks: [{source: _home/.config/foo/a, dest: [$HOME/.config/bar/a, /etc/bar/a]}]
    expected:
      output: ""
  - name: ShouldFlagBogusWriteTypeEnum
    input:
      args:
        - doc: |
            p:
              include:
                renderTemplates:
                  - templates:
                      - source: templates/a.tpl
                        dest:
                          - {path: a.md, options: {writeType: bogus}}
    expected:
      output: writeType
  - name: ShouldFlagNonOctalChmod
    input:
      args:
        - doc: |
            p:
              include:
                makeDirs:
                  - chmod: rwxr-xr-x
                    directories: [_home/.cache]
    expected:
      output: chmod
  - name: ShouldFlagGroupWithoutFiles
    input:
      args:
        - doc: |
            p:
              include:
                makeCopies:
                  - chmod: "0644"
    expected:
      output: files
  - name: ShouldFlagDroppedPluginsKey
    input:
      args:
        - doc: |
            p:
              plugins:
                - ./sub::p
    expected:
      output: plugins
  - name: ShouldFlagDroppedMixinProfilesKey
    input:
      args:
        - doc: |
            p:
              mixinProfiles: [base]
    expected:
      output: mixinProfiles
  - name: ShouldAcceptTopLevelOptionsEnvInclude
    input:
      args:
        - doc: |
            options:
              runIf: ['env:X']
              autoDiscover: true
              logLevel: info
              validateSpec: warn
            env:
              GITLAB_GROUP: konradodwrot
            include:
              sources: ["@https://gitlab.com/g/r.git", ./sibling]
            p:
              include:
                makeLinks: [_home/**]
    expected:
      output: ""
  - name: ShouldAcceptIncludeProfilesUnionForms
    input:
      args:
        - doc: |
            p:
              include:
                profiles:
                  - base
                  - source: "@https://gitlab.com/g/r.git/che.yml::gitlabGroup"
                    env: {GITLAB_GROUP: konradodwrot}
    expected:
      output: ""
  - name: ShouldFlagBogusValidateSpecEnum
    input:
      args:
        - doc: |
            options:
              validateSpec: bogus
    expected:
      output: validateSpec
# [<] 🤖🤖
