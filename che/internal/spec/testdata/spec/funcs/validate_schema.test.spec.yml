# [>] 🤖🤖
context:
  function: spec.ValidateSchema
cases:
  - name: ShouldAcceptEveryTestutilFixture
    input:
      args: [fixturesGlob: ../testutil/specs/*.yml]
    expected:
      output: ""
  - name: ShouldReturnNoFindingsForUnparseableYAML
    input:
      args: [doc: "p: ["]
    expected:
      output: ""
  - name: ShouldAnchorRootViolationAtSlash
    input:
      args: [doc: "- a\n- b\n"]
    expected:
      output: '{{/^/: /}}'
  - name: ShouldFlagExtraKey
    input:
      args:
        - doc: |
            p:
              includes:
                link: [HOME/**]
    expected:
      output: includes
  - name: ShouldFlagBogusWriteTypeEnum
    input:
      args:
        - doc: |
            p:
              include:
                renderTemplates:
                  - files:
                      - source: templates/a.tpl
                        dest:
                          - {path: a.md, options: {writeType: bogus}}
    expected:
      output: writeType
  - name: ShouldFlagNonOctalChmod
    input:
      args:
        - doc: |
            p:
              include:
                mkdirs:
                  - chmod: rwxr-xr-x
                    files: [HOME/.cache]
    expected:
      output: chmod
  - name: ShouldFlagGroupWithoutFiles
    input:
      args:
        - doc: |
            p:
              include:
                copy:
                  - chmod: "0644"
    expected:
      output: files
  - name: ShouldFlagDroppedPluginsKey
    input:
      args:
        - doc: |
            p:
              plugins:
                - ./plugin::p
    expected:
      output: plugins
  - name: ShouldFlagDroppedMixinProfilesKey
    input:
      args:
        - doc: |
            p:
              mixinProfiles: [base]
    expected:
      output: mixinProfiles
  - name: ShouldAcceptTopLevelOptionsEnvInclude
    input:
      args:
        - doc: |
            options:
              execIf: ['env:X']
              autoDiscover: true
              debug: false
              validateSpec: warn
            env:
              GITLAB_GROUP: konradodwrot
            include:
              sources: ["@https://gitlab.com/g/r.git", ./sibling]
            p:
              include:
                link: [HOME/**]
    expected:
      output: ""
  - name: ShouldAcceptIncludeProfilesUnionForms
    input:
      args:
        - doc: |
            p:
              include:
                profiles:
                  - base
                  - ref: gitlabGroup
                    options: {source: "@https://gitlab.com/g/r.git"}
                    env: {GITLAB_GROUP: konradodwrot}
    expected:
      output: ""
  - name: ShouldFlagBogusValidateSpecEnum
    input:
      args:
        - doc: |
            options:
              validateSpec: bogus
    expected:
      output: validateSpec
# [<] 🤖🤖
