# [>] 🤖🤖
context:
  function: spec.parsePluginRef
cases:
  - name: ShouldParseScpRemote
    input:
      args: [entry: "@git@gitlab.com:g/r.git::p"]
    expected:
      output: {url: "git@gitlab.com:g/r.git", profile: p, isPath: false}
  - name: ShouldParseHttpsRemote
    input:
      args: [entry: "@https://gitlab.com/g/r.git::p"]
    expected:
      output: {url: "https://gitlab.com/g/r.git", profile: p, isPath: false}
  - name: ShouldParseSshRemote
    input:
      args: [entry: "@ssh://git@gitlab.com/g/r.git::p"]
    expected:
      output: {url: "ssh://git@gitlab.com/g/r.git", profile: p, isPath: false}
  - name: ShouldParseFileUrlRemote
    input:
      args: [entry: "@file:///tmp/x::p"]
    expected:
      output: {url: "file:///tmp/x", profile: p, isPath: false}
  - name: ShouldParseAbsoluteDirAsPath
    input:
      args: [entry: /abs/dir::p]
    expected:
      output: {url: /abs/dir, profile: p, isPath: true}
  - name: ShouldParseDotRelativeDirAsPath
    input:
      args: [entry: ./rel::p]
    expected:
      output: {url: ./rel, profile: p, isPath: true}
  - name: ShouldParseBareRelativeDirAsPath
    input:
      args: [entry: rel/dir::p]
    expected:
      output: {url: rel/dir, profile: p, isPath: true}
  - name: ShouldParseTildeDirAsPath
    input:
      args: [entry: ~/x::p]
    expected:
      output: {url: ~/x, profile: p, isPath: true}
  - name: ShouldParseEnvVarDirAsPath
    input:
      args: [entry: $HOME/x::p]
    expected:
      output: {url: $HOME/x, profile: p, isPath: true}
  - name: ShouldErrorOnRemoteWithoutProfile
    input:
      args: [entry: "@nourl"]
    expected:
      errorOutput: ['plugins entry']
  - name: ShouldErrorOnDirWithoutProfile
    input:
      args: [entry: nodir]
    expected:
      errorOutput: ['plugins entry']
  - name: ShouldErrorOnEmptyRemoteUrl
    input:
      args: [entry: "@::p"]
    expected:
      errorOutput: ['plugins entry']
  - name: ShouldErrorOnEmptyDirPath
    input:
      args: [entry: "::p"]
    expected:
      errorOutput: ['plugins entry']
  - name: ShouldErrorOnEmptyRemoteProfile
    input:
      args: [entry: "@url::"]
    expected:
      errorOutput: ['plugins entry']
  - name: ShouldErrorOnEmptyDirProfile
    input:
      args: [entry: "dir::"]
    expected:
      errorOutput: ['plugins entry']
# [<] 🤖🤖
