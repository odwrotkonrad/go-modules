# [>] 🤖🤖
context:
  function: spec.ProfileRecipe.MakeProfile
cases:
  - name: ShouldMergeIncludedProfilesForDesktopProfile
    context: {pwd: testdata/fixture/resolve/tree-merge}
    input:
      args: [spec: merge, profile: desktop/macos]
    expected:
      scripts: [ci/zsh/scripts/installs/10-brew.zsh, ci/zsh/scripts/installs/20-kitty.zsh]
      perms:
        /var/log/grafana: {chmod: "2775"}
        Library/LaunchDaemons/otelcol.plist.ontoHost.cp: {chmod: "0600"}
    contains:
      extraDirs: [/var/log/grafana, _home/.cache/zsh]
      links: [etc/grafana/grafana.ini]
  - name: ShouldExcludeDesktopEntriesForCliProfile
    context: {pwd: testdata/fixture/resolve/tree-merge}
    input:
      args: [spec: merge, profile: cli/macos]
    expected:
      scripts: [ci/zsh/scripts/installs/10-brew.zsh]
    notExpected:
      extraDirs: [/var/log/grafana]
      links: [etc/grafana/grafana.ini]
  - name: ShouldClassifyTreeIntoLinksCopiesTemplates
    context: {pwd: testdata/fixture/resolve/tree-classify}
    input:
      args: [spec: classify, profile: cli/macos]
    expected:
      links:
        - _home/.config/git/config
        - _home/.config/zsh/.zshrc
        - etc/zsh/zshenv
        - etc/zshrc
      copies:
        - Library/LaunchDaemons/otelcol.plist.ontoHost.cp
        - _home/.config/zsh/x.ontoHost.cp
      templates: [_home/.config/zsh/y.ontoHost.tpl]
    contains:
      dirs: [_home, _home/.config/zsh]
  - name: ShouldErrorOnUndefinedProfile
    context: {pwd: testdata/fixture/resolve/tree-merge}
    input:
      args: [spec: merge, profile: cli/linux]
    expected:
      errorOutput: ['profile "cli/linux" is not defined in che.yml']
  - name: ShouldErrorOnIncludeProfilesCycle
    context: {pwd: testdata/fixture/resolve/tree-empty}
    input:
      args: [spec: cycle, profile: cli/macos]
    expected:
      errorOutput: ['include.profiles cycle:']
  - name: ShouldApplyIncludeAndExcludeSections
    context: {pwd: testdata/fixture/resolve/tree-include-exclude}
    input:
      args: [spec: include-exclude, profile: cli/macos]
    contains:
      links: [_home/.config/extra/x, etc/zshrc]
      scripts: [ci/zsh/scripts/installs/10-brew.zsh]
    notExpected:
      links: [etc/zsh/zshenv]
      copies: [_home/.config/zsh/c.ontoHost.cp]
      scripts: [ci/zsh/scripts/installs/20-foo.zsh]
  - name: ShouldExcludeScriptsMatchingGlob
    context: {pwd: testdata/fixture/resolve/tree-exclude-script-glob}
    input:
      args: [spec: exclude-script-glob, profile: cli/macos]
    expected:
      scripts: [ci/zsh/scripts/installs/10-brew.zsh, ci/zsh/scripts/installs/30-tmux.zsh]
  - name: ShouldErrorOnUndefinedIncludedProfile
    context: {pwd: testdata/fixture/resolve/tree-empty}
    input:
      args: [spec: undefined-include, profile: cli/macos]
    expected:
      errorOutput: ['include.profiles names undefined profile "nonexistent"']
  - name: ShouldParseRichRepoTemplateEntries
    context: {pwd: testdata/fixture/resolve/tree-empty}
    input:
      args: [spec: repo-template, profile: cli/macos]
    expected:
      templates: [templates/1-env/local.env.ontoRepo.tpl, templates/3-agents/AGENTS.md.ontoRepo.tpl]
      dests:
        templates/1-env/local.env.ontoRepo.tpl: [.env]
        templates/3-agents/AGENTS.md.ontoRepo.tpl: [CLAUDE.md, AGENTS.md]
      templateOpts:
        - [{writeType: mergeUpsert}]
        - [{}, {renderReferencedFiles: true}]
  - name: ShouldAcceptRemoteTemplateSourceWithCtx
    context: {pwd: testdata/fixture/resolve/tree-empty}
    input:
      args: [spec: remote-template, profile: cli/macos]
    expected:
      templates: ["@gitlab.com/acme/tools//snippets/agent.md"]
      templateDests: [[.claude/agents/ro.md]]
      templateOpts: [[{skipAutoGeneratedHeader: true}]]
      ctx:
        "@gitlab.com/acme/tools//snippets/agent.md": {repo: Notes}
  - name: ShouldMergeGroupCtxUnderItemCtx
    context: {pwd: testdata/fixture/resolve/tree-empty}
    input:
      args: [spec: remote-template-group-ctx, profile: cli/macos]
    expected:
      templates: ["@gitlab.com/acme/tools//snippets/ro.md", "@gitlab.com/acme/tools//snippets/rw.md"]
      ctx:
        "@gitlab.com/acme/tools//snippets/ro.md": {repo: Workspace, model: fable}
        "@gitlab.com/acme/tools//snippets/rw.md": {repo: Workspace, model: sonnet}
  - name: ShouldMergeGroupOptionsUnderDestOptions
    context: {pwd: testdata/fixture/resolve/tree-empty}
    input:
      args: [spec: remote-template-group-options, profile: cli/macos]
    expected:
      templates: ["@gitlab.com/acme/tools//snippets/gitignore", "@gitlab.com/acme/tools//snippets/ro.md", "@gitlab.com/acme/tools//snippets/settings.json"]
      templateOpts:
        - [{}]
        - [{skipAutoGeneratedHeader: true}]
        - [{skipAutoGeneratedHeader: true, renderReferencedFiles: true}]
  - name: ShouldErrorOnRemoteTemplateWithoutDest
    context: {pwd: testdata/fixture/resolve/tree-empty}
    input:
      args: [spec: remote-template-no-dest, profile: cli/macos]
    expected:
      errorOutput: [renderTemplates remote source requires explicit dest]
  - name: ShouldErrorOnRemoteTemplateGlob
    context: {pwd: testdata/fixture/resolve/tree-empty}
    input:
      args: [spec: remote-template-glob, profile: cli/macos]
    expected:
      errorOutput: [renderTemplates glob cannot be remote]
  - name: ShouldErrorOnMalformedRemoteTemplateSource
    context: {pwd: testdata/fixture/resolve/tree-empty}
    input:
      args: [spec: remote-template-malformed, profile: cli/macos]
    expected:
      errorOutput: ['renderTemplates remote source malformed, want @<repo>//<path>']
  - name: ShouldComposeIncludedProfilesInGivenOrder
    context: {pwd: testdata/fixture/resolve/tree-empty}
    input:
      args: [spec: ambiguous, profile: both]
    expected:
      templates: [templates/1-env/local.env.ontoRepo.tpl, templates/1-env/local.env.ontoRepo.tpl]
      templateDests: [[.env], [.env2]]
  - name: ShouldCollectAndDedupeSourcedRefs
    context: {pwd: testdata/fixture/resolve/tree-empty}
    input:
      args: [spec: sourced-profiles, profile: main]
    expected:
      refs:
        - {source: "@git@gitlab.com:g/r.git", profile: p}
        - {source: "@https://gitlab.com/g/r2.git", profile: q, env: {GITLAB_GROUP: konradodwrot}}
    contains:
  - name: ShouldMapLinkMatchesThroughSedRewriteRule
    context: {pwd: testdata/fixture/resolve/tree-link-rewrite}
    input:
      args: [spec: link-rewrite, profile: cli/macos]
    expected:
      links: [_home/.config/foo/a, _home/.config/foo/b, etc/zshrc]
      dests:
        _home/.config/foo/a: [_home/.config/bar/a]
        _home/.config/foo/b: [_home/.config/bar/b]
        etc/zshrc: []
  - name: ShouldContributeRewrittenLinkAncestorDirs
    context: {pwd: testdata/fixture/resolve/tree-link-rewrite}
    input:
      args: [spec: link-rewrite, profile: cli/macos]
    contains:
      dirs: [_home/.config/bar]
    notExpected:
      dirs: [_home/.config/foo]
  - name: ShouldExcludeLinkByRewrittenDest
    context: {pwd: testdata/fixture/resolve/tree-link-rewrite}
    input:
      args: [spec: link-rewrite, profile: exclude-rewritten]
    contains:
      links: [_home/.config/foo/a]
    notExpected:
      links: [_home/.config/foo/b]
  - name: ShouldMapExplicitDestLinksOverGlobTwins
    context: {pwd: testdata/fixture/resolve/tree-link-rewrite}
    input:
      args: [spec: link-explicit, profile: cli/macos]
    expected:
      links: [_home/.config/foo/a, _home/.config/foo/b, etc/zshrc]
      dests:
        _home/.config/foo/a: [$HOME/.config/bar/a, /etc/bar/a]
        _home/.config/foo/b: []
        etc/zshrc: []
  - name: ShouldContributeExplicitLinkAncestorDirs
    context: {pwd: testdata/fixture/resolve/tree-link-rewrite}
    input:
      args: [spec: link-explicit, profile: cli/macos]
    contains:
      dirs: [$HOME/.config/bar]
  - name: ShouldExcludeLinkByExplicitDest
    context: {pwd: testdata/fixture/resolve/tree-link-rewrite}
    input:
      args: [spec: link-explicit, profile: exclude-explicit]
    contains:
      links: [_home/.config/foo/b]
    notExpected:
      links: [_home/.config/foo/a]
  - name: ShouldErrorOnMalformedLinkDestRule
    context: {pwd: testdata/fixture/resolve/tree-link-rewrite}
    input:
      args: [spec: link-rewrite-bad, profile: cli/macos]
    expected:
      errorOutput: [dest rule]
  - name: ShouldMapCopyAndTemplateMatchesThroughDestRewriteRule
    context: {pwd: testdata/fixture/resolve/tree-copy-template-rewrite}
    input:
      args: [spec: copy-template-rewrite, profile: cli/macos]
    expected:
      copies: [_home/.config/foo/a.ontoHost.cp]
      templates: [_home/.config/foo/b.conf.tpl]
      dests:
        _home/.config/foo/a.ontoHost.cp: [$HOME/.config/foo/a]
        _home/.config/foo/b.conf.tpl: [$HOME/.config/foo/b.conf]
  - name: ShouldContributeRewrittenCopyAndTemplateAncestorDirs
    context: {pwd: testdata/fixture/resolve/tree-copy-template-rewrite}
    input:
      args: [spec: copy-template-rewrite, profile: cli/macos]
    contains:
      dirs: [$HOME/.config/foo]
    notExpected:
      dirs: [_home/.config/foo]
  - name: ShouldErrorOnLocalRefWithEnv
    context: {pwd: testdata/fixture/resolve/tree-ref-env-local}
    input:
      args: [spec: "", profile: main]
    expected:
      errorOutput: ['env requires a source']
  - name: ShouldErrorOnUndefinedProfileRef
    context: {pwd: testdata/fixture/resolve/tree-empty}
    input:
      args: [spec: undefined-profile-ref, profile: main]
    expected:
      errorOutput: ['include.profiles names undefined profile "nonexistent-ref"']
