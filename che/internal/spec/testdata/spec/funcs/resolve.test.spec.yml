# [>] 🤖🤖
context:
  function: spec.CheSpec.Resolve
cases:
  - name: ShouldMergeMixinsForDesktopProfile
    context: {pwd: testdata/fixture/resolve/tree-merge}
    input:
      args: [spec: merge, profiles: [desktop/macos]]
    expected:
      scripts: [ci/zsh/scripts/installs/10-brew.zsh, ci/zsh/scripts/installs/20-kitty.zsh]
      services: [otelcol, port-exporter, grafana, prometheus]
      perms:
        /var/log/grafana: {chmod: "2775"}
        Library/LaunchDaemons/otelcol.plist.ontoHost.cp: {chmod: "0600"}
    contains:
      extraDirs: [/var/log/grafana, HOME/.cache/zsh]
      links: [etc/grafana/grafana.ini]
  - name: ShouldExcludeDesktopEntriesForCliProfile
    context: {pwd: testdata/fixture/resolve/tree-merge}
    input:
      args: [spec: merge, profiles: [cli/macos]]
    expected:
      scripts: [ci/zsh/scripts/installs/10-brew.zsh]
      services: [otelcol, port-exporter]
    notExpected:
      extraDirs: [/var/log/grafana]
      links: [etc/grafana/grafana.ini]
  - name: ShouldClassifyTreeIntoLinksCopiesTemplates
    context: {pwd: testdata/fixture/resolve/tree-classify}
    input:
      args: [spec: classify, profiles: [cli/macos]]
    expected:
      links:
        - HOME/.config/git/config
        - HOME/.config/zsh/.zshrc
        - etc/zsh/zshenv
        - etc/zshrc
      copies:
        - HOME/.config/zsh/x.ontoHost.cp
        - Library/LaunchDaemons/otelcol.plist.ontoHost.cp
      templates: [root/HOME/.config/zsh/y.ontoHost.tpl]
    contains:
      dirs: [HOME, HOME/.config/zsh]
  - name: ShouldErrorOnUndefinedProfile
    context: {pwd: testdata/fixture/resolve/tree-merge}
    input:
      args: [spec: merge, profiles: [cli/linux]]
    expected:
      errorOutput: ['profile "cli/linux" is not defined in che.yml']
  - name: ShouldErrorOnMixinCycle
    context: {pwd: testdata/fixture/resolve/tree-empty}
    input:
      args: [spec: cycle, profiles: [cli/macos]]
    expected:
      errorOutput: ['mixinProfiles cycle:']
  - name: ShouldApplyIncludeAndExcludeSections
    context: {pwd: testdata/fixture/resolve/tree-include-exclude}
    input:
      args: [spec: include-exclude, profiles: [cli/macos]]
    contains:
      links: [HOME/.config/extra/x, etc/zshrc]
      scripts: [ci/zsh/scripts/installs/10-brew.zsh]
      services: [otelcol]
    notExpected:
      links: [etc/zsh/zshenv]
      copies: [HOME/.config/zsh/c.ontoHost.cp]
      scripts: [ci/zsh/scripts/installs/20-foo.zsh]
      services: [grafana]
  - name: ShouldExcludeScriptsMatchingGlob
    context: {pwd: testdata/fixture/resolve/tree-exclude-script-glob}
    input:
      args: [spec: exclude-script-glob, profiles: [cli/macos]]
    expected:
      scripts: [ci/zsh/scripts/installs/10-brew.zsh, ci/zsh/scripts/installs/30-tmux.zsh]
  - name: ShouldErrorOnUndefinedMixin
    context: {pwd: testdata/fixture/resolve/tree-empty}
    input:
      args: [spec: undefined-include, profiles: [cli/macos]]
    expected:
      errorOutput: ['mixinProfiles names undefined profile "nonexistent"']
  - name: ShouldParseRichRepoTemplateEntries
    context: {pwd: testdata/fixture/resolve/tree-empty}
    input:
      args: [spec: repo-template, profiles: [cli/macos]]
    expected:
      templates: [templates/1-env/local.env.ontoRepo.tpl, templates/3-agents/AGENTS.md.ontoRepo.tpl]
      dests:
        templates/1-env/local.env.ontoRepo.tpl: [.env]
        templates/3-agents/AGENTS.md.ontoRepo.tpl: [CLAUDE.md, AGENTS.md]
      templateOpts:
        - [{writeType: mergeUpsert}]
        - [{}, {renderReferencedFiles: true}]
  - name: ShouldErrorOnRepoTemplateGlob
    context: {pwd: testdata/fixture/resolve/tree-empty}
    input:
      args: [spec: repo-template-glob, profiles: [cli/macos]]
    expected:
      errorOutput: [renderTemplates glob must be root/-prefixed]
  - name: ShouldAcceptRemoteTemplateSourceWithCtx
    context: {pwd: testdata/fixture/resolve/tree-empty}
    input:
      args: [spec: remote-template, profiles: [cli/macos]]
    expected:
      templates: ["@gitlab.com/acme/tools//snippets/agent.md"]
      templateDests: [[.claude/agents/ro.md]]
      templateOpts: [[{skipAutoGeneratedHeader: true}]]
      ctx:
        "@gitlab.com/acme/tools//snippets/agent.md": {repo: Notes}
  - name: ShouldMergeGroupCtxUnderItemCtx
    context: {pwd: testdata/fixture/resolve/tree-empty}
    input:
      args: [spec: remote-template-group-ctx, profiles: [cli/macos]]
    expected:
      templates: ["@gitlab.com/acme/tools//snippets/ro.md", "@gitlab.com/acme/tools//snippets/rw.md"]
      ctx:
        "@gitlab.com/acme/tools//snippets/ro.md": {repo: Workspace, model: fable}
        "@gitlab.com/acme/tools//snippets/rw.md": {repo: Workspace, model: sonnet}
  - name: ShouldMergeGroupOptionsUnderDestOptions
    context: {pwd: testdata/fixture/resolve/tree-empty}
    input:
      args: [spec: remote-template-group-options, profiles: [cli/macos]]
    expected:
      templates: ["@gitlab.com/acme/tools//snippets/gitignore", "@gitlab.com/acme/tools//snippets/ro.md", "@gitlab.com/acme/tools//snippets/settings.json"]
      templateOpts:
        - [{}]
        - [{skipAutoGeneratedHeader: true}]
        - [{skipAutoGeneratedHeader: true, renderReferencedFiles: true}]
  - name: ShouldErrorOnRemoteTemplateWithoutDest
    context: {pwd: testdata/fixture/resolve/tree-empty}
    input:
      args: [spec: remote-template-no-dest, profiles: [cli/macos]]
    expected:
      errorOutput: [renderTemplates remote source requires explicit dest]
  - name: ShouldErrorOnRemoteTemplateGlob
    context: {pwd: testdata/fixture/resolve/tree-empty}
    input:
      args: [spec: remote-template-glob, profiles: [cli/macos]]
    expected:
      errorOutput: [renderTemplates glob cannot be remote]
  - name: ShouldErrorOnMalformedRemoteTemplateSource
    context: {pwd: testdata/fixture/resolve/tree-empty}
    input:
      args: [spec: remote-template-malformed, profiles: [cli/macos]]
    expected:
      errorOutput: ['renderTemplates remote source malformed, want @<repo>//<path>']
  - name: ShouldUnionProfilesInGivenOrder
    context: {pwd: testdata/fixture/resolve/tree-empty}
    input:
      args: [spec: ambiguous, profiles: [repo, other]]
    expected:
      templates: [templates/1-env/local.env.ontoRepo.tpl, templates/1-env/local.env.ontoRepo.tpl]
      templateDests: [[.env], [.env2]]
  - name: ShouldCollectAndDedupePluginRefs
    context: {pwd: testdata/fixture/resolve/tree-empty}
    input:
      args: [spec: plugins, profiles: [main]]
    expected:
      plugins:
        - {url: "git@gitlab.com:g/r.git", profile: p}
        - {url: "https://gitlab.com/g/r2.git", profile: q, env: {GITLAB_GROUP: konradodwrot}}
    contains:
      services: [svc]
  - name: ShouldMapLinkMatchesThroughSedRewriteRule
    context: {pwd: testdata/fixture/resolve/tree-link-rewrite}
    input:
      args: [spec: link-rewrite, profiles: [cli/macos]]
    expected:
      links: [HOME/.config/foo/a, HOME/.config/foo/b, etc/zshrc]
      dests:
        HOME/.config/foo/a: [HOME/.config/bar/a]
        HOME/.config/foo/b: [HOME/.config/bar/b]
        etc/zshrc: []
  - name: ShouldContributeRewrittenLinkAncestorDirs
    context: {pwd: testdata/fixture/resolve/tree-link-rewrite}
    input:
      args: [spec: link-rewrite, profiles: [cli/macos]]
    contains:
      dirs: [HOME/.config/bar]
    notExpected:
      dirs: [HOME/.config/foo]
  - name: ShouldExcludeLinkByRewrittenDest
    context: {pwd: testdata/fixture/resolve/tree-link-rewrite}
    input:
      args: [spec: link-rewrite, profiles: [exclude-rewritten]]
    contains:
      links: [HOME/.config/foo/a]
    notExpected:
      links: [HOME/.config/foo/b]
  - name: ShouldErrorOnMalformedLinkDestRule
    context: {pwd: testdata/fixture/resolve/tree-link-rewrite}
    input:
      args: [spec: link-rewrite-bad, profiles: [cli/macos]]
    expected:
      errorOutput: [link dest]
  - name: ShouldErrorOnMalformedPluginRef
    context: {pwd: testdata/fixture/resolve/tree-plugin-malformed}
    input:
      args: [spec: "", profiles: [main]]
    expected:
      errorOutput: ['plugins entry "@nourl"']
  - name: ShouldErrorOnUndefinedMixinPluginRef
    context: {pwd: testdata/fixture/resolve/tree-empty}
    input:
      args: [spec: mixin-plugin-ref, profiles: [main]]
    expected:
      errorOutput: [mixinProfiles names undefined profile]
# [<] 🤖🤖
