# [>] 🤖🤖
- name: eligibleProfilesShouldSelectProfileWithPassingExecIf
  in:
    spec: che
    os: macos
    virt: true
  want:
    profiles: [cli/macos]
- name: eligibleProfilesShouldErrorWhenNoProfileEligible
  in:
    spec: che
    os: linux
    virt: true
  want:
    error: true
- name: forceOneShouldStillEnforceExecIf
  in:
    spec: che
    os: linux
    virt: true
    forceOne: desktop/macos
  want:
    error: true
- name: forceOneWithForceAllShouldLiftExecIf
  in:
    spec: che
    os: linux
    virt: true
    forceOne: desktop/macos
    forceAll: true
  want:
    profiles: [desktop/macos]
- name: forceOneShouldSelectProfileWhenExecIfPasses
  in:
    spec: che
    os: macos
    virt: false
    forceOne: desktop/macos
  want:
    profiles: [desktop/macos]
- name: forceOneShouldSelectNonAutoexecBaseProfile
  in:
    spec: che
    os: linux
    virt: true
    forceOne: base
  want:
    profiles: [base]
- name: forceOneShouldSelectNonAutoexecOntoRepoProfile
  in:
    spec: che
    os: linux
    virt: true
    forceOne: ontoRepo
  want:
    profiles: [ontoRepo]
- name: forceOneShouldErrorOnUndefinedProfile
  in:
    spec: che
    os: macos
    virt: true
    forceOne: cli/linux
  want:
    error: true
- name: forceAllShouldSelectAllAutoexecProfiles
  in:
    spec: che
    os: linux
    virt: true
    forceAll: true
  want:
    profiles: [cli/macos, desktop/macos]
- name: eligibleProfilesShouldAlwaysSelectLonePlainProfile
  in:
    spec: repo
    os: linux
    virt: true
  want:
    profiles: [repo]
- name: eligibleProfilesShouldUnionInDeclarationOrder
  in:
    spec: ambiguous
    os: linux
    virt: true
  want:
    profiles: [repo, other]
# [<] 🤖🤖
