# [>] 🤖🤖
- name: evalExecIfShouldBeTrueForSetEnv
  in:
    env: {CHE_TEST_SET: grp}
    args: [env:CHE_TEST_SET]
  want:
    value: true
- name: evalExecIfShouldBeFalseForEmptyEnv
  in:
    env: {CHE_TEST_EMPTY: ""}
    args: [env:CHE_TEST_EMPTY]
  want:
    value: false
- name: evalExecIfShouldBeFalseForUnsetEnv
  in:
    args: [env:CHE_TEST_UNSET]
  want:
    value: false
- name: evalExecIfShouldMatchEnvEquality
  in:
    env: {CHE_TEST_SET: grp}
    args: [env:CHE_TEST_SET == grp]
  want:
    value: true
- name: evalExecIfShouldRejectEnvEqualityMismatch
  in:
    env: {CHE_TEST_SET: grp}
    args: [env:CHE_TEST_SET == other]
  want:
    value: false
- name: evalExecIfShouldEquateUnsetEnvWithEmpty
  in:
    args: ["env:CHE_TEST_UNSET == "]
  want:
    value: true
- name: evalExecIfShouldMatchBuiltinOsEquality
  in:
    args: [builtin:isOs == macos]
  want:
    value: true
- name: evalExecIfShouldRejectBuiltinOsMismatch
  in:
    args: [builtin:isOs == linux]
  want:
    value: false
- name: evalExecIfShouldParseEqualityWithoutSpaces
  in:
    args: [builtin:isOs==macos]
  want:
    value: true
- name: evalExecIfShouldEvalBareBuiltinIsVirt
  in:
    args: [builtin:isVirt]
  want:
    value: false
- name: evalExecIfShouldMatchBuiltinIsVirtEqualsFalse
  in:
    args: [builtin:isVirt == false]
  want:
    value: true
- name: evalExecIfShouldErrorOnUnknownBuiltin
  in:
    args: [builtin:isWindows]
  want:
    error: true
- name: evalExecIfShouldErrorOnUnknownScheme
  in:
    args: [host:isOs]
  want:
    error: true
- name: evalExecIfShouldErrorOnBareWord
  in:
    args: [GITLAB_GROUP]
  want:
    error: true
- name: evalExecIfShouldErrorOnUnknownSourceInEquality
  in:
    args: [host:isOs == macos]
  want:
    error: true
- name: evalExecIfShouldErrorOnDoubleEquality
  in:
    args: [a == b == c]
  want:
    error: true
# [<] 🤖🤖
