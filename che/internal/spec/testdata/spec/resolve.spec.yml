# [>] 🤖🤖
- name: resolveShouldMergeMixinsForDesktopProfile
  in:
    spec: merge
    tree: tree-merge
    profiles: [desktop/macos]
  want:
    scripts: [ci/zsh/scripts/installs/10-brew.zsh, ci/zsh/scripts/installs/20-kitty.zsh]
    services: [otelcol, port-exporter, grafana, prometheus]
    perms:
      /var/log/grafana: {chmod: "2775"}
      Library/LaunchDaemons/otelcol.plist.ontoHost.cp: {chmod: "0600"}
  contains:
    extraDirs: [/var/log/grafana, HOME/.cache/zsh]
    links: [etc/grafana/grafana.ini]
- name: resolveShouldExcludeDesktopEntriesForCliProfile
  in:
    spec: merge
    tree: tree-merge
    profiles: [cli/macos]
  want:
    scripts: [ci/zsh/scripts/installs/10-brew.zsh]
    services: [otelcol, port-exporter]
  notWant:
    extraDirs: [/var/log/grafana]
    links: [etc/grafana/grafana.ini]
- name: resolveShouldClassifyTreeIntoLinksCopiesTemplates
  in:
    spec: classify
    tree: tree-classify
    profiles: [cli/macos]
  want:
    links:
      - HOME/.config/git/config
      - HOME/.config/zsh/.zshrc
      - etc/zsh/zshenv
      - etc/zshrc
    copies:
      - HOME/.config/zsh/x.ontoHost.cp
      - Library/LaunchDaemons/otelcol.plist.ontoHost.cp
    templates: [root/HOME/.config/zsh/y.ontoHost.tpl]
  contains:
    dirs: [HOME, HOME/.config/zsh]
- name: resolveShouldErrorOnUndefinedProfile
  in:
    spec: merge
    tree: tree-merge
    profiles: [cli/linux]
  want:
    error: true
- name: resolveShouldErrorOnMixinCycle
  in:
    spec: cycle
    tree: tree-empty
    profiles: [cli/macos]
  want:
    error: true
- name: resolveShouldApplyIncludeAndExcludeSections
  in:
    spec: include-exclude
    tree: tree-include-exclude
    profiles: [cli/macos]
  contains:
    links: [HOME/.config/extra/x, etc/zshrc]
    scripts: [ci/zsh/scripts/installs/10-brew.zsh]
    services: [otelcol]
  notWant:
    links: [etc/zsh/zshenv]
    copies: [HOME/.config/zsh/c.ontoHost.cp]
    scripts: [ci/zsh/scripts/installs/20-foo.zsh]
    services: [grafana]
- name: resolveShouldExcludeScriptsMatchingGlob
  in:
    spec: exclude-script-glob
    tree: tree-exclude-script-glob
    profiles: [cli/macos]
  want:
    scripts: [ci/zsh/scripts/installs/10-brew.zsh, ci/zsh/scripts/installs/30-tmux.zsh]
- name: resolveShouldErrorOnUndefinedMixin
  in:
    spec: undefined-include
    tree: tree-empty
    profiles: [cli/macos]
  want:
    error: true
- name: resolveShouldParseRichRepoTemplateEntries
  in:
    spec: repo-template
    tree: tree-empty
    profiles: [cli/macos]
  want:
    templates: [templates/1-env/local.env.ontoRepo.tpl, templates/3-agents/AGENTS.md.ontoRepo.tpl]
    dests:
      templates/1-env/local.env.ontoRepo.tpl: [.env]
      templates/3-agents/AGENTS.md.ontoRepo.tpl: [CLAUDE.md, AGENTS.md]
    templateOpts:
      - [{writeType: mergeUpsert}]
      - [{}, {renderReferencedFiles: true}]
- name: resolveShouldErrorOnRepoTemplateGlob
  in:
    spec: repo-template-glob
    tree: tree-empty
    profiles: [cli/macos]
  want:
    error: true
- name: resolveShouldUnionProfilesInGivenOrder
  in:
    spec: ambiguous
    tree: tree-empty
    profiles: [repo, other]
  want:
    templates: [templates/1-env/local.env.ontoRepo.tpl, templates/1-env/local.env.ontoRepo.tpl]
    templateDests: [[.env], [.env2]]
- name: resolveShouldCollectAndDedupePluginRefs
  in:
    spec: plugins
    tree: tree-empty
    profiles: [main]
  want:
    plugins:
      - {url: "git@gitlab.com:g/r.git", profile: p}
      - {url: "https://gitlab.com/g/r2.git", profile: q, env: {GITLAB_GROUP: konradodwrot}}
  contains:
    services: [svc]
- name: linkRewriteShouldMapMatchedFilesThroughSedRule
  in:
    spec: link-rewrite
    tree: tree-link-rewrite
    profiles: [cli/macos]
  want:
    links: [HOME/.config/foo/a, HOME/.config/foo/b, etc/zshrc]
    dests:
      HOME/.config/foo/a: [HOME/.config/bar/a]
      HOME/.config/foo/b: [HOME/.config/bar/b]
      etc/zshrc: []
- name: linkRewriteShouldContributeRewrittenAncestorDirs
  in:
    spec: link-rewrite
    tree: tree-link-rewrite
    profiles: [cli/macos]
  contains:
    dirs: [HOME/.config/bar]
  notWant:
    dirs: [HOME/.config/foo]
- name: excludeShouldDropLinkByRewrittenDest
  in:
    spec: link-rewrite
    tree: tree-link-rewrite
    profiles: [exclude-rewritten]
  contains:
    links: [HOME/.config/foo/a]
  notWant:
    links: [HOME/.config/foo/b]
- name: linkDestRuleMalformedShouldError
  in:
    spec: link-rewrite-bad
    tree: tree-link-rewrite
    profiles: [cli/macos]
  want:
    error: true
    stdErr: [link dest]
- name: resolveShouldErrorOnMalformedPluginRef
  in:
    tree: tree-plugin-malformed
    profiles: [main]
  want:
    error: true
- name: resolveShouldErrorOnUndefinedMixinPluginRef
  in:
    spec: mixin-plugin-ref
    tree: tree-empty
    profiles: [main]
  want:
    error: true
    stdErr: [undefined profile]
