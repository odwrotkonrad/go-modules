# [>] 🤖🤖
- name: parsePluginRefShouldParseScpRemote
  in:
    args: ["@git@gitlab.com:g/r.git::p"]
  want:
    url: git@gitlab.com:g/r.git
    profile: p
    isPath: false
- name: parsePluginRefShouldParseHttpsRemote
  in:
    args: ["@https://gitlab.com/g/r.git::p"]
  want:
    url: https://gitlab.com/g/r.git
    profile: p
    isPath: false
- name: parsePluginRefShouldParseSshRemote
  in:
    args: ["@ssh://git@gitlab.com/g/r.git::p"]
  want:
    url: ssh://git@gitlab.com/g/r.git
    profile: p
    isPath: false
- name: parsePluginRefShouldParseFileUrlRemote
  in:
    args: ["@file:///tmp/x::p"]
  want:
    url: file:///tmp/x
    profile: p
    isPath: false
- name: parsePluginRefShouldParseAbsoluteDirAsPath
  in:
    args: [/abs/dir::p]
  want:
    url: /abs/dir
    profile: p
    isPath: true
- name: parsePluginRefShouldParseDotRelativeDirAsPath
  in:
    args: [./rel::p]
  want:
    url: ./rel
    profile: p
    isPath: true
- name: parsePluginRefShouldParseBareRelativeDirAsPath
  in:
    args: [rel/dir::p]
  want:
    url: rel/dir
    profile: p
    isPath: true
- name: parsePluginRefShouldParseTildeDirAsPath
  in:
    args: [~/x::p]
  want:
    url: ~/x
    profile: p
    isPath: true
- name: parsePluginRefShouldParseEnvVarDirAsPath
  in:
    args: [$HOME/x::p]
  want:
    url: $HOME/x
    profile: p
    isPath: true
- name: parsePluginRefShouldErrorOnRemoteWithoutProfile
  in:
    args: ["@nourl"]
  want:
    error: true
- name: parsePluginRefShouldErrorOnDirWithoutProfile
  in:
    args: [nodir]
  want:
    error: true
- name: parsePluginRefShouldErrorOnEmptyRemoteUrl
  in:
    args: ["@::p"]
  want:
    error: true
- name: parsePluginRefShouldErrorOnEmptyDirPath
  in:
    args: ["::p"]
  want:
    error: true
- name: parsePluginRefShouldErrorOnEmptyRemoteProfile
  in:
    args: ["@url::"]
  want:
    error: true
- name: parsePluginRefShouldErrorOnEmptyDirProfile
  in:
    args: ["dir::"]
  want:
    error: true
# [<] 🤖🤖
