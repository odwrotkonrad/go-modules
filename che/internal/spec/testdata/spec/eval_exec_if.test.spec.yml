# [>] 🤖🤖
context:
  function: spec.Evaluator.EvalExecIf
cases:
  - name: evalExecIfShouldBeTrueForSetEnv
    context:
      env: {CHE_TEST_SET: grp}
    input:
      args: [expr: env:CHE_TEST_SET]
    expected:
      output: true
  - name: evalExecIfShouldBeFalseForEmptyEnv
    context:
      env: {CHE_TEST_EMPTY: ""}
    input:
      args: [expr: env:CHE_TEST_EMPTY]
    expected:
      output: false
  - name: evalExecIfShouldBeFalseForUnsetEnv
    input:
      args: [expr: env:CHE_TEST_UNSET]
    expected:
      output: false
  - name: evalExecIfShouldMatchEnvEquality
    context:
      env: {CHE_TEST_SET: grp}
    input:
      args: [expr: env:CHE_TEST_SET == grp]
    expected:
      output: true
  - name: evalExecIfShouldRejectEnvEqualityMismatch
    context:
      env: {CHE_TEST_SET: grp}
    input:
      args: [expr: env:CHE_TEST_SET == other]
    expected:
      output: false
  - name: evalExecIfShouldEquateUnsetEnvWithEmpty
    input:
      args: [expr: "env:CHE_TEST_UNSET == "]
    expected:
      output: true
  - name: evalExecIfShouldMatchBuiltinOsEquality
    input:
      args: [expr: builtin:isOs == macos]
    expected:
      output: true
  - name: evalExecIfShouldRejectBuiltinOsMismatch
    input:
      args: [expr: builtin:isOs == linux]
    expected:
      output: false
  - name: evalExecIfShouldParseEqualityWithoutSpaces
    input:
      args: [expr: builtin:isOs==macos]
    expected:
      output: true
  - name: evalExecIfShouldEvalBareBuiltinIsVirt
    input:
      args: [expr: builtin:isVirt]
    expected:
      output: false
  - name: evalExecIfShouldMatchBuiltinIsVirtEqualsFalse
    input:
      args: [expr: builtin:isVirt == false]
    expected:
      output: true
  - name: evalExecIfShouldErrorOnUnknownBuiltin
    input:
      args: [expr: builtin:isWindows]
    expected:
      errorOutput: ['unknown builtin "builtin:isWindows"']
  - name: evalExecIfShouldErrorOnUnknownScheme
    input:
      args: [expr: host:isOs]
    expected:
      errorOutput: ['unknown source "host:isOs"']
  - name: evalExecIfShouldErrorOnBareWord
    input:
      args: [expr: GITLAB_GROUP]
    expected:
      errorOutput: ['unknown source "GITLAB_GROUP"']
  - name: evalExecIfShouldErrorOnUnknownSourceInEquality
    input:
      args: [expr: host:isOs == macos]
    expected:
      errorOutput: ['unknown source "host:isOs"']
  - name: evalExecIfShouldErrorOnDoubleEquality
    input:
      args: [expr: a == b == c]
    expected:
      errorOutput: ['malformed expression: want <source> or <source> == <literal>']
# [<] 🤖🤖
