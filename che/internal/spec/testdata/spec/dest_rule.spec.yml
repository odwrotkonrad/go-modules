- name: sedShouldRewriteFirstMatchWithoutGFlag
  in:
    rule: s/o/0/
    path: HOME/.config/foo/oo
  want:
    value: HOME/.c0nfig/foo/oo
- name: sedGlobalShouldRewriteEveryMatch
  in:
    rule: s/o/0/g
    path: HOME/.config/foo/oo
  want:
    value: HOME/.c0nfig/f00/00
- name: sedShouldSupportCaptureGroups
  in:
    rule: s/(foo)/x$1/
    path: HOME/foo/a
  want:
    value: HOME/xfoo/a
- name: sedWithEscapedSlashShouldParse
  in:
    rule: s/foo\/bar/baz/
    path: HOME/foo/bar/a
  want:
    value: HOME/baz/a
- name: sedWithoutMatchShouldKeepPathUnchanged
  in:
    rule: s/zzz/x/
    path: HOME/foo/a
  want:
    value: HOME/foo/a
- name: oneToOneValueShouldError
  in:
    rule: "1:1"
    path: HOME/foo/a
  want:
    error: true
    stdErr: [link dest]
- name: emptyRuleShouldError
  in:
    rule: ""
    path: HOME/foo/a
  want:
    error: true
    stdErr: [link dest]
- name: malformedRuleShouldError
  in:
    rule: s/foo/bar
    path: HOME/foo/a
  want:
    error: true
    stdErr: [link dest]
- name: invalidRegexShouldError
  in:
    rule: s/[/x/
    path: HOME/foo/a
  want:
    error: true
    stdErr: [link dest]
