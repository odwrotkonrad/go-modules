# [>] 🤖🤖
context:
  function: spec.parsePluginRef
cases:
  - name: parsePluginRefShouldParseScpRemote
    input:
      args: [entry: "@git@gitlab.com:g/r.git::p"]
    expected:
      output: {url: "git@gitlab.com:g/r.git", profile: p, isPath: false}
  - name: parsePluginRefShouldParseHttpsRemote
    input:
      args: [entry: "@https://gitlab.com/g/r.git::p"]
    expected:
      output: {url: "https://gitlab.com/g/r.git", profile: p, isPath: false}
  - name: parsePluginRefShouldParseSshRemote
    input:
      args: [entry: "@ssh://git@gitlab.com/g/r.git::p"]
    expected:
      output: {url: "ssh://git@gitlab.com/g/r.git", profile: p, isPath: false}
  - name: parsePluginRefShouldParseFileUrlRemote
    input:
      args: [entry: "@file:///tmp/x::p"]
    expected:
      output: {url: "file:///tmp/x", profile: p, isPath: false}
  - name: parsePluginRefShouldParseAbsoluteDirAsPath
    input:
      args: [entry: /abs/dir::p]
    expected:
      output: {url: /abs/dir, profile: p, isPath: true}
  - name: parsePluginRefShouldParseDotRelativeDirAsPath
    input:
      args: [entry: ./rel::p]
    expected:
      output: {url: ./rel, profile: p, isPath: true}
  - name: parsePluginRefShouldParseBareRelativeDirAsPath
    input:
      args: [entry: rel/dir::p]
    expected:
      output: {url: rel/dir, profile: p, isPath: true}
  - name: parsePluginRefShouldParseTildeDirAsPath
    input:
      args: [entry: ~/x::p]
    expected:
      output: {url: ~/x, profile: p, isPath: true}
  - name: parsePluginRefShouldParseEnvVarDirAsPath
    input:
      args: [entry: $HOME/x::p]
    expected:
      output: {url: $HOME/x, profile: p, isPath: true}
  - name: parsePluginRefShouldErrorOnRemoteWithoutProfile
    input:
      args: [entry: "@nourl"]
    expected:
      errorOutput: ['plugins entry']
  - name: parsePluginRefShouldErrorOnDirWithoutProfile
    input:
      args: [entry: nodir]
    expected:
      errorOutput: ['plugins entry']
  - name: parsePluginRefShouldErrorOnEmptyRemoteUrl
    input:
      args: [entry: "@::p"]
    expected:
      errorOutput: ['plugins entry']
  - name: parsePluginRefShouldErrorOnEmptyDirPath
    input:
      args: [entry: "::p"]
    expected:
      errorOutput: ['plugins entry']
  - name: parsePluginRefShouldErrorOnEmptyRemoteProfile
    input:
      args: [entry: "@url::"]
    expected:
      errorOutput: ['plugins entry']
  - name: parsePluginRefShouldErrorOnEmptyDirProfile
    input:
      args: [entry: "dir::"]
    expected:
      errorOutput: ['plugins entry']
# [<] 🤖🤖
