# [>] 🤖🤖
- name: isOptionEqualToShouldMatchEqualDirectory
  in: {config: {dir: /repo}, option: directory, val: /repo}
  want: {equal: true}
- name: isOptionEqualToShouldRejectDifferentDirectory
  in: {config: {dir: /repo}, option: directory, val: /other}
  want: {equal: false}
- name: isOptionEqualToShouldMatchEqualDryRun
  in: {config: {dryRun: 1}, option: dry-run, val: 1}
  want: {equal: true}
- name: isOptionEqualToShouldRejectDifferentDryRun
  in: {config: {dryRun: 1}, option: dry-run, val: 2}
  want: {equal: false}
- name: isOptionEqualToShouldMatchEqualProfile
  in: {config: {profile: cli/macos}, option: profile, val: cli/macos}
  want: {equal: true}
- name: isOptionEqualToShouldRejectDifferentProfile
  in: {config: {profile: cli/macos}, option: profile, val: desktop/macos}
  want: {equal: false}
- name: isOptionEqualToShouldMatchEqualSkipExecIf
  in: {config: {skipExecIf: true}, option: skip-exec-if, val: true}
  want: {equal: true}
- name: isOptionEqualToShouldRejectDifferentSkipExecIf
  in: {config: {skipExecIf: true}, option: skip-exec-if, val: false}
  want: {equal: false}
- name: isOptionEqualToShouldMatchEqualSkipPlugins
  in: {config: {skipPlugins: true}, option: skip-plugins, val: true}
  want: {equal: true}
- name: isOptionEqualToShouldRejectDifferentSkipPlugins
  in: {config: {skipPlugins: false}, option: skip-plugins, val: true}
  want: {equal: false}
- name: isOptionEqualToShouldMatchEqualDebug
  in: {config: {debug: true}, option: debug, val: true}
  want: {equal: true}
- name: isOptionEqualToShouldRejectDifferentDebug
  in: {config: {debug: true}, option: debug, val: false}
  want: {equal: false}
- name: isOptionEqualToShouldMatchEqualValidateSchema
  in: {config: {validateSchema: warn}, option: validate-schema, val: warn}
  want: {equal: true}
- name: isOptionEqualToShouldRejectDifferentValidateSchema
  in: {config: {validateSchema: warn}, option: validate-schema, val: error}
  want: {equal: false}
- name: isOptionEqualToShouldPanicOnUnknownOption
  in: {option: bogus, val: x}
  want: {panic: true}
# [<] 🤖🤖
