- name: linkShouldSymlinkRepoFilesOntoHomeAndSystem
  in:
    op: link
  want:
    stdOut: |
      mkdir(create): ${HOME}/.config
      mkdir(create): ${HOME}/.config/zsh
      archive: {{/.*/}}che-link-{{/.*/}}.tar.bz2
      ln(create): ${HOME}/.config/zsh/.zshrc
      ln(create): /etc/zshrc
    fsCalls: |
      mkdir ${HOME}/.config
      mkdir ${HOME}/.config/zsh
      archive {{/.*/}}che-link-{{/.*/}}.tar.bz2
      symlink ${ROOT}/HOME/.config/zsh/.zshrc ${HOME}/.config/zsh/.zshrc
      symlink ${ROOT}/etc/zshrc /etc/zshrc
- name: copyShouldCopyMarkerFilesAndChownDaemonPlist
  in:
    op: copy
  want:
    stdOut: |
      cp(create): ${HOME}/.config/zsh/c
      cp(create): /Library/LaunchDaemons/otelcol.plist
      cp(chown): root:wheel /Library/LaunchDaemons/otelcol.plist
    fsCalls: |
      archive {{/.*/}}che-copy-{{/.*/}}.tar.bz2
      copy ${ROOT}/HOME/.config/zsh/c.ontoHost.cp ${HOME}/.config/zsh/c 0000
      copy ${ROOT}/Library/LaunchDaemons/otelcol.plist.ontoHost.cp /Library/LaunchDaemons/otelcol.plist 0644
      chown root:wheel /Library/LaunchDaemons/otelcol.plist
- name: renderTemplatesShouldRenderAndInstallHostDest
  in:
    op: render-templates
  want:
    stdOut: |
      archive: {{/.*/}}che-render-{{/.*/}}.tar.bz2
      render(create): ${HOME}/.config/zsh/t
    fsCalls: |
      archive {{/.*/}}che-render-{{/.*/}}.tar.bz2
      install ${HOME}/.config/zsh/t 0000
- name: mkDirsShouldCreateConfigDirsAndReapplySetgidChmod
  in:
    op: mk-dirs
  want:
    stdOut: |
      mkdir(create): ${HOME}/.config
      mkdir(create): ${HOME}/.config/zsh
      mkdir(create): ${HOME}/.cache/zsh
      mkdir(create): /var/log/che-test-setgid
      mkdir(chmod): 2775 /var/log/che-test-setgid
    fsCalls: |
      mkdir ${HOME}/.config
      mkdir ${HOME}/.config/zsh
      mkdir -p ${HOME}/.cache/zsh
      mkdir -p -m 2775 /var/log/che-test-setgid
      chmod 2775 /var/log/che-test-setgid
- name: pruneLinksShouldRemoveNothingOnFreshTree
  in:
    op: prune-links
  want:
    stdOut: |
      prune-links: ${ROOT}
  notWant:
    fsCalls:
      - remove
- name: pruneLinksShouldRemoveBrokenRepoLink
  in:
    op: prune-links
    brokenLink: true
  want:
    stdOut: |
      prune-links: ${ROOT}
      rm: ${HOME}/.config/zsh/dead
    fsCalls:
      - remove ${HOME}/.config/zsh/dead
- name: runScriptsShouldExecEachScriptAndReportOk
  in:
    op: run-scripts
  want:
    stdOut: |
      run-scripts: ${REPO}/install/unit
      run-scripts(report): ok ${REPO}/install/unit
    cmds:
      - ${REPO}/install/unit
- name: runScriptsShouldReportFailAndReturnError
  in:
    op: run-scripts
    failCmds: [install/unit]
  want:
    error: true
    stdErr:
      - 'scripts failed: '
    stdOut: |
      run-scripts(fail): ${REPO}/install/unit: stub: fail install/unit
      run-scripts(report): fail ${REPO}/install/unit
- name: servicesBootoutShouldUnloadLoadedService
  in:
    op: services-bootout
  want:
    stdOut:
      - 'bootout: system/otelcol'
    cmds: |
      {{/(sudo )?/}}launchctl print system/otelcol
      {{/(sudo )?/}}launchctl bootout system/otelcol
      {{/(sudo )?/}}launchctl print system/otelcol
- name: servicesBootoutShouldSkipUnloadedService
  in:
    op: services-bootout
    notLoaded: true
  want:
    cmds:
      - launchctl print system/otelcol
  notWant:
    stdOut:
      - bootout
    cmds:
      - launchctl bootout
- name: servicesBootinShouldBootstrapFromPlist
  in:
    op: services-bootin
  want:
    stdOut:
      - 'bootstrap: system/otelcol'
    cmds:
      - launchctl bootstrap system /Library/LaunchDaemons/otelcol.plist
- name: servicesBootinShouldReportFailedBootstrap
  in:
    op: services-bootin
    failCmds: [bootstrap]
  want:
    error: true
    stdErr:
      - 'bootstrap system/otelcol: '
    stdOut:
      - 'bootstrap(fail): bootstrap system/otelcol: '
- name: servicesEnsureShouldSettleThenReportRunningPid
  in:
    op: services-ensure
  want:
    stdOut: |
      settle: 15s before pid check
      running: system/otelcol (pid 4242)
    cmds:
      - launchctl print system/otelcol
- name: servicesEnsureShouldErrorWhenPidMissing
  in:
    op: services-ensure
    noPid: true
  want:
    error: true
    stdErr:
      - 'service(s) have no running process'
    stdOut:
      - 'error: system/otelcol has no running process'
