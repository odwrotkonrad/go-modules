context:
  function: host.isOwnerDrifted
  mockedInterfaces:
    fsutil.UserLookup: testutil.UserMockLookup
    fsutil.GroupLookup: testutil.GroupMockLookup
cases:
  - name: ownerDriftShouldReportNoDriftWhenUidAndGidMatch
    input:
      args: [owner: "ko:staff", users: {ko: 501}, groups: {staff: 20}, uid: 501, gid: 20]
    expected:
      output: false
  - name: ownerDriftShouldReportDriftWhenUidDiffers
    input:
      args: [owner: "ko:staff", users: {ko: 501}, groups: {staff: 20}, uid: 502, gid: 20]
    expected:
      output: true
  - name: ownerDriftShouldReportDriftWhenGidDiffers
    input:
      args: [owner: "ko:staff", users: {ko: 501}, groups: {staff: 20}, uid: 501, gid: 0]
    expected:
      output: true
  - name: ownerDriftShouldReportNoDriftForUnresolvableNames
    input:
      args: [owner: "ghost:phantom", users: {ko: 501}, groups: {staff: 20}, uid: 501, gid: 20]
    expected:
      output: false
  - name: ownerDriftShouldCheckOnlyUidForBareOwner
    input:
      args: [owner: ko, users: {ko: 501}, groups: {staff: 20}, uid: 501, gid: 999]
    expected:
      output: false
  - name: ownerDriftShouldReportDriftForBareOwnerUidMismatch
    input:
      args: [owner: ko, users: {ko: 501}, groups: {staff: 20}, uid: 0, gid: 20]
    expected:
      output: true
  - name: ownerDriftShouldReportNoDriftWithoutStatSys
    input:
      args: [owner: "ko:staff", users: {ko: 501}, groups: {staff: 20}, uid: 0, gid: 0, noStat: true]
    expected:
      output: false
# [<] 🤖🤖
