- name: ownerDriftShouldReportNoDriftWhenUidAndGidMatch
  in:
    uid: 501
    gid: 20
    owner: "ko:staff"
    users: {ko: 501}
    groups: {staff: 20}
  want: false
- name: ownerDriftShouldReportDriftWhenUidDiffers
  in:
    uid: 502
    gid: 20
    owner: "ko:staff"
    users: {ko: 501}
    groups: {staff: 20}
  want: true
- name: ownerDriftShouldReportDriftWhenGidDiffers
  in:
    uid: 501
    gid: 0
    owner: "ko:staff"
    users: {ko: 501}
    groups: {staff: 20}
  want: true
- name: ownerDriftShouldReportNoDriftForUnresolvableNames
  in:
    uid: 501
    gid: 20
    owner: "ghost:phantom"
    users: {ko: 501}
    groups: {staff: 20}
  want: false
- name: ownerDriftShouldCheckOnlyUidForBareOwner
  in:
    uid: 501
    gid: 999
    owner: ko
    users: {ko: 501}
    groups: {staff: 20}
  want: false
- name: ownerDriftShouldReportDriftForBareOwnerUidMismatch
  in:
    uid: 0
    gid: 20
    owner: ko
    users: {ko: 501}
    groups: {staff: 20}
  want: true
- name: ownerDriftShouldReportNoDriftWithoutStatSys
  in:
    noStat: true
    owner: "ko:staff"
    users: {ko: 501}
    groups: {staff: 20}
  want: false
