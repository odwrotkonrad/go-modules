- name: pruneLinksShouldRemoveNothingOnFreshTree
  in:
    op: prune-links
  want:
    stdOut: |
      prune-links: ${ROOT}
  notWant:
    stdOut:
      - 'rm: '
- name: pruneLinksShouldRemoveBrokenRepoLink
  in:
    op: prune-links
    brokenLink: true
  want:
    stdOut: |
      prune-links: ${ROOT}
      rm: ${HOME}/.config/zsh/dead
