# [>] 🤖
context:
  command: che make-links
  pwd: testdata/fixture/commands/common/sample-tree
  mockedInterfaces:
    execx.CmdExecutor: testutil.CmdMockExecutor
    fsutil.FileSystemWriter: testutil.FileSystemMockWriter
    fsutil.FileSystemReader: testutil.FileSystemMockReader
cases:
  - name: ShouldSymlinkRepoFilesOntoHomeAndSystem
    expected:
      stdOut: |
        make-dirs(created): ${HOME}/.config
        make-dirs(created): ${HOME}/.config/bar
        make-dirs(created): ${HOME}/.config/zsh
        make-dirs(created): /Library
        make-dirs(created): /Library/LaunchDaemons
        make-dirs(created): /etc
        backup: ${HOME}/.local/state/che/backups/che-make-links-{{/.*/}}.tar.bz2
        make-links(created): ${HOME}/.config/bar/a
        make-links(created): ${HOME}/.config/zsh/.zshrc
        make-links(created): /etc/zshrc
  - name: ShouldRewriteDestPathWithSedRule
    expected:
      stdOut: |
        make-links(created): ${HOME}/.config/bar/a
  - name: ShouldLogDiscoveryBeforeDirectOp
    expected:
      stdOut: |
        discover-profiles(match): cli/macos: profileWorkingDirectory: {{/[^,]*/}}, ops: [{{/.*/}}]
        make-links(runProfile): cli/macos: [make-links(3)]
        make-dirs(created): ${HOME}/.config
# [<] 🤖
