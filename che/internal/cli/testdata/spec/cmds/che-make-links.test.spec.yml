context:
  command: che make-links
  pwd: testdata/fixture/commands/common/sample-tree
  mockedInterfaces:
    execx.CmdExecutor: testutil.CmdMockExecutor
    fsutil.FileSystemWriter: testutil.FileSystemMockWriter
    fsutil.FileSystemReader: testutil.FileSystemMockReader
cases:
  - name: ShouldSymlinkRepoFilesOntoHomeAndSystem
    expected:
      stdOut: |
        ## Profile cli/macos
        ### make-links
          created ${HOME}/.config
          created ${HOME}/.config/bar
          created ${HOME}/.config/zsh
          created /Library
          created /Library/LaunchDaemons
          created /etc
          created ${HOME}/.local/state/che/backups/che-make-links-{{/\S*/}}.tar.bz2
          created ${HOME}/.config/bar/a
          created ${HOME}/.config/zsh/.zshrc
          created /etc/zshrc
  - name: ShouldRewriteDestPathWithSedRule
    expected:
      stdOut: |
        created ${HOME}/.config/bar/a
  - name: ShouldLogDiscoveryBeforeDirectOp
    expected:
      stdOut: |
        ### Profile cli/macos  (profile workdir: {{/[^)]*/}})
          make-dirs: 8 changes
          make-links: 3 changes
          make-copies: 2 changes
          render-templates: 1 change
          run-scripts: 1 change
        ## Profile cli/macos
        ### make-links
          created ${HOME}/.config
