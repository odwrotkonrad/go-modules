context:
  command: che all
  mockedInterfaces:
    execx.CmdExecutor: testutil.CmdMockExecutor
    fsutil.FileSystemWriter: testutil.FileSystemMockWriter
    fsutil.FileSystemReader: testutil.FileSystemMockReader
cases:
  - name: ShouldRunEveryOpSelectedInSpec
    context:
      pwd: testdata/fixture/commands/common/sample-tree
    expected:
      stdOut: |
        all(discover): cli/macos
        all(run): prune-links
        prune-links: ${ROOT}
        all(run): make-dirs
        make-dirs(create): ${HOME}/.config
        make-dirs(create): ${HOME}/.config/bar
        make-dirs(create): ${HOME}/.config/zsh
        make-dirs(create): /Library
        make-dirs(create): /Library/LaunchDaemons
        make-dirs(create): /etc
        make-dirs(create): ${HOME}/.cache/zsh
        make-dirs(create): /var/log/che-test-setgid
        make-dirs(chmod): 2775 /var/log/che-test-setgid
        all(run): make-links
        make-dirs(create): ${HOME}/.config
        make-dirs(create): ${HOME}/.config/bar
        make-dirs(create): ${HOME}/.config/zsh
        make-dirs(create): /Library
        make-dirs(create): /Library/LaunchDaemons
        make-dirs(create): /etc
        backup: ${HOME}/.local/state/che/backups/che-make-links-{{/.*/}}.tar.bz2
        make-links(create): ${HOME}/.config/bar/a
        make-links(create): ${HOME}/.config/zsh/.zshrc
        make-links(create): /etc/zshrc
        all(run): make-copies
        make-dirs(create): ${HOME}/.config
        make-dirs(create): ${HOME}/.config/bar
        make-dirs(create): ${HOME}/.config/zsh
        make-dirs(create): /Library
        make-dirs(create): /Library/LaunchDaemons
        make-dirs(create): /etc
        backup: ${HOME}/.local/state/che/backups/che-make-copies-{{/.*/}}.tar.bz2
        make-copies(create): /Library/LaunchDaemons/otelcol.plist
        make-copies(chown): root:wheel /Library/LaunchDaemons/otelcol.plist
        make-copies(create): ${HOME}/.config/zsh/c
        all(run): render-templates
        backup: ${HOME}/.local/state/che/backups/che-render-{{/.*/}}.tar.bz2
        render(create): ${HOME}/.config/zsh/t
        all(run): run-scripts
        run-scripts: ${REPO}/install/setup
        run-scripts(report): ok ${REPO}/install/setup
  - name: ShouldSkipOpsWithoutSelection
    context:
      pwd: testdata/fixture/commands/all/sample-tree-only-links
    expected:
      stdOut: |
        all(discover): cli/macos
        all(run): prune-links
        prune-links: ${ROOT}
        all(run): make-dirs
        make-dirs(create): ${HOME}/.config
        make-dirs(create): ${HOME}/.config/bar
        all(run): make-links
        make-dirs(create): ${HOME}/.config
        make-dirs(create): ${HOME}/.config/bar
        backup: ${HOME}/.local/state/che/backups/che-make-links-{{/.*/}}.tar.bz2
        make-links(create): ${HOME}/.config/bar/a
    notExpected:
      stdOut:
        - 'all(run): make-copies'
        - 'all(run): render-templates'
        - 'all(run): run-scripts'
        - 'all(run): services'
        - cp(create
        - render(create
        - bootout
  - name: ShouldSkipOpsListedInAllSkipOpsEnv
    context:
      pwd: testdata/fixture/commands/common/sample-tree
      env: {CHE_ALL_SKIP_OPS: run-scripts, CHE_DEBUG: "1"}
    expected:
      stdOut:
        - 'all(skip): run-scripts'
    notExpected:
      stdOut:
        - 'all(run): run-scripts'
        - 'run-scripts: '
  - name: ShouldSkipOpsListedInSkipOpsEnv
    context:
      pwd: testdata/fixture/commands/common/sample-tree
      env: {CHE_SKIP_OPS: "run-scripts,make-copies", CHE_DEBUG: "1"}
    expected:
      stdOut:
        - 'all(skip): make-copies'
        - 'all(run): render-templates'
    notExpected:
      stdOut:
        - 'all(run): run-scripts'
        - 'all(run): make-copies'
        - cp(create
