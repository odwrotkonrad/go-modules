# [>] 🤖
context:
  command: che run-scripts
  pwd: testdata/fixture/commands/common/sample-tree
  mockedInterfaces:
    execx.CmdExecutor: testutil.CmdMockExecutor
    fsutil.FileSystemWriter: testutil.FileSystemMockWriter
    fsutil.FileSystemReader: testutil.FileSystemMockReader
cases:
  - name: ShouldExecEachScriptAndReportOk
    expected:
      stdOut: |
        run-scripts: ${REPO}/install/setup
        run-scripts(report): ok ${REPO}/install/setup
  - name: ShouldNarrowToMatchingName
    context:
      command: che run-scripts setup
    expected:
      stdOut: |
        run-scripts: ${REPO}/install/setup
  - name: ShouldErrorWhenNameMatchesNothing
    context:
      command: che run-scripts nonExistingScript
    expected:
      exitCode: 1
      stdErr:
        - 'no script matches: [nonExistingScript]'
    notExpected:
      stdOut:
        - 'run-scripts: '
  - name: ShouldNoOpWhenGloballySkipped
    context:
      env: {CHE_SKIP_OPS: run-scripts}
    expected:
      stdOut: |
        all(skip): run-scripts (skipped by config)
    notExpected:
      stdOut:
        - 'run-scripts: '
  - name: ShouldNotErrorOnNameFilterWhenGloballySkipped
    context:
      command: che run-scripts nonExistingScript
      env: {CHE_SKIP_OPS: run-scripts}
    expected:
      stdOut: |
        all(skip): run-scripts (skipped by config)
    notExpected:
      stdOut:
        - 'run-scripts: '
# [<] 🤖
