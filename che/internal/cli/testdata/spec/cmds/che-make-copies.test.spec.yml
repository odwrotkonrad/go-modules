# [>] 🤖
context:
  command: che make-copies
  pwd: testdata/fixture/commands/common/sample-tree
  mockedInterfaces:
    execx.CmdExecutor: testutil.CmdMockExecutor
    fsutil.FileSystemWriter: testutil.FileSystemMockWriter
    fsutil.FileSystemReader: testutil.FileSystemMockReader
cases:
  - name: ShouldCopyMarkerFilesAndChownDaemonPlist
    expected:
      stdOut: |
        # Run profile cli/macos
        ## make-copies
          created ${HOME}/.config
          created ${HOME}/.config/bar
          created ${HOME}/.config/zsh
          created /Library
          created /Library/LaunchDaemons
          created /etc
          created ${HOME}/.local/state/che/backups/che-make-copies-{{/\S*/}}.tar.bz2
          created /Library/LaunchDaemons/otelcol.plist
          chown root:wheel /Library/LaunchDaemons/otelcol.plist
          created ${HOME}/.config/zsh/c
  - name: ShouldNoOpWhenGloballySkipped
    context:
      env: {CHE_SKIP_OPS: make-copies, CHE_LOG_LEVEL: debug}
    expected:
      stdOut:
        - 'will not run profile cli/macos: options.skipOps'
    notExpected:
      stdOut:
        - created /Library/LaunchDaemons/otelcol.plist
# [<] 🤖
