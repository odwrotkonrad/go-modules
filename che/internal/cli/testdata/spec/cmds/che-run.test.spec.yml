# [>] 🤖
context:
  command: che run
  mockedInterfaces:
    execx.CmdExecutor: testutil.CmdMockExecutor
    fsutil.FileSystemWriter: testutil.FileSystemMockWriter
    fsutil.FileSystemReader: testutil.FileSystemMockReader
cases:
  - name: ShouldRunEveryOpSelectedInSpec
    context:
      pwd: testdata/fixture/commands/common/sample-tree
    expected:
      stdOut: |
        profile cli/macos:
          backup delta make-links (3 changes), make-copies (2 changes), render-templates (1 change)
          created ${HOME}/.config
          created ${HOME}/.config/bar
          created ${HOME}/.config/zsh
          created /Library
          created /Library/LaunchDaemons
          created /etc
          created ${HOME}/.cache/zsh
          created /var/log/che-test-setgid
          chmod 2775 /var/log/che-test-setgid
          created ${HOME}/.config
          created ${HOME}/.config/bar
          created ${HOME}/.config/zsh
          created /Library
          created /Library/LaunchDaemons
          created /etc
          created ${HOME}/.config/bar/a
          created ${HOME}/.config/zsh/.zshrc
          created /etc/zshrc
          created ${HOME}/.config
          created ${HOME}/.config/bar
          created ${HOME}/.config/zsh
          created /Library
          created /Library/LaunchDaemons
          created /etc
          created /Library/LaunchDaemons/otelcol.plist
          chown root:wheel /Library/LaunchDaemons/otelcol.plist
          created ${HOME}/.config/zsh/c
          created ${HOME}/.config/zsh/t
          ran ${REPO}/install/setup
  - name: ShouldSkipOpsWithoutSelection
    context:
      pwd: testdata/fixture/commands/all/sample-tree-only-links
    expected:
      stdOut: |
        profile cli/macos:
          backup delta make-links (1 change)
          created ${HOME}/.config
          created ${HOME}/.config/bar
          created ${HOME}/.config
          created ${HOME}/.config/bar
          created ${HOME}/.config/bar/a
    notExpected:
      stdOut:
        - otelcol.plist
        - 'ran '
        - bootout
  - name: ShouldSkipOpsListedInAllSkipOpsEnv
    context:
      pwd: testdata/fixture/commands/common/sample-tree
      env: {CHE_RUN_SKIP_OPS: run-scripts, CHE_LOG_LEVEL: debug}
    expected:
      stdOut:
        - 'will not run op run-scripts: options.run.skipOps'
    notExpected:
      stdOut:
        - 'will run run-scripts'
        - 'ran '
  - name: ShouldSkipOpsListedInSkipOpsEnv
    context:
      pwd: testdata/fixture/commands/common/sample-tree
      env: {CHE_SKIP_OPS: "run-scripts,make-copies", CHE_LOG_LEVEL: debug}
    expected:
      stdOut:
        - 'will not run op make-copies: options.skipOps'
        - 'will run render-templates'
    notExpected:
      stdOut:
        - 'will run run-scripts'
        - 'will run make-copies'
        - 'ran '
        - created /Library/LaunchDaemons/otelcol.plist
  - name: ShouldLogDiscoverySummaryBeforeExecution
    context:
      pwd: testdata/fixture/commands/all/sample-tree-only-links
    expected:
      stdOutCounts:
        'discovered profile ': 1
      stdOut: |
        discovered profile cli/macos  (working directory: {{/[^)]*/}})
          make-dirs: 2 changes
          make-links: 1 change
        profile cli/macos:
  - name: ShouldLogDiscoveryOnceWithDebug
    context:
      pwd: testdata/fixture/commands/all/sample-tree-only-links
      env: {CHE_LOG_LEVEL: debug}
    expected:
      stdOutCounts:
        'discovered profile ': 1
      stdOut:
        - 'discovered profile cli/macos  (working directory: {{/[^)]*/}})'
  - name: ShouldAnnounceZeroDeltaOpsAsSkipped
    context:
      pwd: testdata/fixture/commands/all/sample-tree-only-links
      env: {CHE_LOG_LEVEL: debug}
    expected:
      stdOut:
        - |
          will run backup: no changes
            backup delta {{/.*/}}
        - 'will run prune-broken-links: no changes'
        - 'will run make-links'
  - name: ShouldExecuteProfilesSequentiallyInDiscoveryOrder
    context:
      command: che run --profile cli/macos,ontoRepo
      pwd: testdata/fixture/commands/common/sample-tree
    expected:
      stdOutCounts:
        'profile cli/macos:': 1
        'profile ontoRepo:': 1
      stdOut: |
        discovered profile cli/macos  (working directory: {{/[^)]*/}})
  - name: ShouldRunSecondProfileOpsAfterFirstProfileFinished
    context:
      command: che run --profile cli/macos,ontoRepo
      pwd: testdata/fixture/commands/common/sample-tree
    expected:
      stdOut: |
        ran ${REPO}/install/setup
        profile ontoRepo:
          backup delta render-templates (1 change)
          created ${REPO}/docs/r.md
# [<] 🤖
