context:
  command: che render-templates
  pwd: testdata/fixture/commands/common/sample-tree
  mockedInterfaces:
    execx.CmdExecutor: testutil.CmdMockExecutor
    fsutil.FileSystemWriter: testutil.FileSystemMockWriter
    fsutil.FileSystemReader: testutil.FileSystemMockReader
cases:
  - name: ShouldRenderOnlyHostDestsForHostProfile
    expected:
      stdOut: |
        backup: ${HOME}/.local/state/che/backups/che-render-{{/.*/}}.tar.bz2
        render-templates(created): ${HOME}/.config/zsh/t
  - name: ShouldRenderOnlyRepoDestsForOntoRepoProfile
    context:
      command: che render-templates --profile ontoRepo
    expected:
      stdOut: |
        render-templates(created): ${REPO}/docs/r.md
    notExpected:
      stdOut:
        - ${HOME}/.config/zsh/t
