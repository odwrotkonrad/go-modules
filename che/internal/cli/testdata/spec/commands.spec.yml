- name: link_should_symlink_repo_files_onto_home_and_system
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [link]
  want:
    stdOut: |
      mkdir(create,dry-run=delta): ${HOME}/.config
      mkdir(create,dry-run=delta): ${HOME}/.config/zsh
      archive(dry-run=delta): ${HOME}/.local/share/che/backups/che-link-{{/.*/}}.tar.bz2
      ln(create,dry-run=delta): ${HOME}/.config/zsh/.zshrc
      ln(create,dry-run=delta): /etc/zshrc
- name: copy_should_copy_marker_files_and_chown_daemon_plist
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [copy]
  want:
    stdOut: |
      mkdir(create,dry-run=delta): ${HOME}/.config
      mkdir(create,dry-run=delta): ${HOME}/.config/zsh
      archive(dry-run=delta): ${HOME}/.local/share/che/backups/che-copy-{{/.*/}}.tar.bz2
      cp(create,dry-run=delta): ${HOME}/.config/zsh/c
      cp(create,dry-run=delta): /Library/LaunchDaemons/otelcol.plist
      cp(chown,dry-run=delta): root:wheel /Library/LaunchDaemons/otelcol.plist
- name: render_templates_should_render_only_host_dests_for_host_profile
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [render-templates]
  want:
    stdOut: |
      archive(dry-run=delta): ${HOME}/.local/share/che/backups/che-render-{{/.*/}}.tar.bz2
      render(create,dry-run=delta): ${HOME}/.config/zsh/t
  notWant:
    stdOut:
      - docs/r.md
- name: render_templates_should_render_only_repo_dests_for_onto_repo_profile
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [render-templates]
    profile: ontoRepo
  want:
    stdOut: |
      render(create,dry-run=delta): ${REPO}/docs/r.md
  notWant:
    stdOut:
      - ${HOME}/.config/zsh/t
- name: mk_dirs_should_create_config_dirs_and_reapply_setgid_chmod
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [mk-dirs]
  want:
    stdOut: |
      mkdir(create,dry-run=delta): ${HOME}/.config
      mkdir(create,dry-run=delta): ${HOME}/.config/zsh
      mkdir(create,dry-run=delta): ${HOME}/.cache/zsh
      mkdir(create,dry-run=delta): /var/log/che-test-setgid
      mkdir(chmod,dry-run=delta): 2775 /var/log/che-test-setgid
- name: prune_links_should_scan_root_and_remove_nothing_on_fresh_tree
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [prune-links]
  want:
    stdOut: |
      prune-links(dry-run=delta): ${ROOT}
- name: run_scripts_should_list_each_script_in_dry_run
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [run-scripts]
  want:
    stdOut: |
      run-scripts(dry-run=delta): ${REPO}/install/unit
- name: run_scripts_should_narrow_to_matching_name
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [run-scripts, unit]
  want:
    stdOut: |
      run-scripts(dry-run=delta): ${REPO}/install/unit
- name: run_scripts_should_error_when_name_matches_nothing
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [run-scripts, __nope__]
  want:
    error: true
- name: services_bootout_should_target_system_domain_service
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [services, bootout]
  want:
    stdOut: |
      bootout(dry-run=delta): system/otelcol
- name: services_bootin_should_bootstrap_system_domain_service
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [services, bootin]
  want:
    stdOut: |
      bootstrap(dry-run=delta): system/otelcol
- name: services_ensure_should_settle_then_check_pid
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [services, ensure]
  want:
    stdOut: |
      settle(dry-run=delta): 15s before pid check
      ensure(dry-run=delta): system/otelcol
- name: detect_should_print_only_the_resolved_profile
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [detect]
  want:
    dryRunLines: false
    stdOut: |
      ${PROFILE}
