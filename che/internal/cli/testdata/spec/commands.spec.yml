- name: linkShouldSymlinkRepoFilesOntoHomeAndSystem
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [link]
  want:
    stdOut: |
      mkdir(create,dry-run=delta): ${HOME}/.config
      mkdir(create,dry-run=delta): ${HOME}/.config/zsh
      archive(dry-run=delta): ${HOME}/.local/share/che/backups/che-link-{{/.*/}}.tar.bz2
      ln(create,dry-run=delta): ${HOME}/.config/zsh/.zshrc
      ln(create,dry-run=delta): /etc/zshrc
- name: copyShouldCopyMarkerFilesAndChownDaemonPlist
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [copy]
  want:
    stdOut: |
      mkdir(create,dry-run=delta): ${HOME}/.config
      mkdir(create,dry-run=delta): ${HOME}/.config/zsh
      archive(dry-run=delta): ${HOME}/.local/share/che/backups/che-copy-{{/.*/}}.tar.bz2
      cp(create,dry-run=delta): ${HOME}/.config/zsh/c
      cp(create,dry-run=delta): /Library/LaunchDaemons/otelcol.plist
      cp(chown,dry-run=delta): root:wheel /Library/LaunchDaemons/otelcol.plist
- name: renderTemplatesShouldRenderOnlyHostDestsForHostProfile
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [render-templates]
  want:
    stdOut: |
      archive(dry-run=delta): ${HOME}/.local/share/che/backups/che-render-{{/.*/}}.tar.bz2
      render(create,dry-run=delta): ${HOME}/.config/zsh/t
  notWant:
    stdOut:
      - docs/r.md
- name: renderTemplatesShouldRenderOnlyRepoDestsForOntoRepoProfile
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [render-templates]
    profile: ontoRepo
  want:
    stdOut: |
      render(create,dry-run=delta): ${REPO}/docs/r.md
  notWant:
    stdOut:
      - ${HOME}/.config/zsh/t
- name: mkDirsShouldCreateConfigDirsAndReapplySetgidChmod
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [mk-dirs]
  want:
    stdOut: |
      mkdir(create,dry-run=delta): ${HOME}/.config
      mkdir(create,dry-run=delta): ${HOME}/.config/zsh
      mkdir(create,dry-run=delta): ${HOME}/.cache/zsh
      mkdir(create,dry-run=delta): /var/log/che-test-setgid
      mkdir(chmod,dry-run=delta): 2775 /var/log/che-test-setgid
- name: pruneLinksShouldScanRootAndRemoveNothingOnFreshTree
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [prune-links]
  want:
    stdOut: |
      prune-links(dry-run=delta): ${ROOT}
- name: runScriptsShouldListEachScriptInDryRun
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [run-scripts]
  want:
    stdOut: |
      run-scripts(dry-run=delta): ${REPO}/install/unit
- name: runScriptsShouldNarrowToMatchingName
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [run-scripts, unit]
  want:
    stdOut: |
      run-scripts(dry-run=delta): ${REPO}/install/unit
- name: runScriptsShouldErrorWhenNameMatchesNothing
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [run-scripts, __nope__]
  want:
    error: true
- name: servicesBootoutShouldTargetSystemDomainService
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [services, bootout]
  want:
    stdOut: |
      bootout(dry-run=delta): system/otelcol
- name: servicesBootinShouldBootstrapSystemDomainService
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [services, bootin]
  want:
    stdOut: |
      bootstrap(dry-run=delta): system/otelcol
- name: servicesEnsureShouldSettleThenCheckPid
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [services, ensure]
  want:
    stdOut: |
      settle(dry-run=delta): 15s before pid check
      ensure(dry-run=delta): system/otelcol
- name: detectShouldPrintOnlyTheResolvedProfile
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [detect]
  want:
    dryRunLines: false
    stdOut: |
      ${PROFILE}
