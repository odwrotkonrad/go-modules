- name: link
  in:
    cmd: link
  want:
    stdOut:
      - "mkdir(create,dry-run=delta): ${HOME}/.config/zsh"
      - "ln(create,dry-run=delta): ${HOME}/.config/zsh/.zshrc"
      - "archive(dry-run=delta): ${HOME}/.local/share/che/backups/che-link-"
      - "ln(create,dry-run=delta): /etc/zshrc"
- name: copy
  in:
    cmd: copy
  want:
    stdOut:
      - "cp(create,dry-run=delta): ${HOME}/.config/zsh/c"
      - "archive(dry-run=delta): ${HOME}/.local/share/che/backups/che-copy-"
      - "cp(create,dry-run=delta): /Library/LaunchDaemons/otelcol.plist"
      - "cp(chown,dry-run=delta): root:wheel /Library/LaunchDaemons/otelcol.plist"
- name: render_host_profile
  in:
    cmd: render-templates
  want:
    stdOut:
      - "render(create,dry-run=delta): ${HOME}/.config/zsh/t"
  notWant:
    stdOut:
      - docs/r.md
- name: render_onto_repo
  in:
    cmd: render-templates
    profile: ontoRepo
  want:
    stdOut:
      - "render(create,dry-run=delta): "
      - docs/r.md
  notWant:
    stdOut:
      - ${HOME}/.config/zsh/t
- name: mk_dirs
  in:
    cmd: mk-dirs
  want:
    stdOut:
      - "mkdir(create,dry-run=delta): ${HOME}/.config/zsh"
      - "mkdir(create,dry-run=delta): ${HOME}/.cache/zsh"
      - "mkdir(create,dry-run=delta): /var/log/che-test-setgid"
      - "mkdir(chmod,dry-run=delta): 2775 /var/log/che-test-setgid"
- name: prune_links
  in:
    cmd: prune-links
  want:
    stdOut:
      - "prune-links(dry-run=delta): ${ROOT}"
- name: run_scripts
  in:
    cmd: run-scripts
  want:
    stdOut:
      - "run-scripts(dry-run=delta): ${REPO}/install/unit"
- name: run_scripts_filter
  in:
    cmd: run-scripts
    args: [unit]
  want:
    stdOut:
      - "run-scripts(dry-run=delta): ${REPO}/install/unit"
- name: run_scripts_filter_miss
  in:
    cmd: run-scripts
    args: [__nope__]
  want:
    error: true
- name: services_bootout
  in:
    cmd: services bootout
  want:
    stdOut:
      - "bootout(dry-run=delta): system/otelcol"
- name: services_bootin
  in:
    cmd: services bootin
  want:
    stdOut:
      - "bootstrap(dry-run=delta): system/otelcol"
- name: services_ensure
  in:
    cmd: services ensure
  want:
    stdOut:
      - "ensure(dry-run=delta): system/otelcol"
- name: detect
  in:
    cmd: detect
  want:
    dryRunLines: false
    stdOut: ["${PROFILE}"]
