- name: linkShouldSymlinkRepoFilesOntoHomeAndSystem
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [link]
  want:
    stdOut: |
      mkdir(create): ${HOME}/.config
      mkdir(create): ${HOME}/.config/zsh
      archive: ${HOME}/.local/share/che/backups/che-link-{{/.*/}}.tar.bz2
      ln(create): ${HOME}/.config/zsh/.zshrc
      ln(create): /etc/zshrc
    fsCalls: |
      mkdir ${HOME}/.config
      mkdir ${HOME}/.config/zsh
      archive ${HOME}/.local/share/che/backups/che-link-{{/.*/}}.tar.bz2
      symlink ${ROOT}/HOME/.config/zsh/.zshrc ${HOME}/.config/zsh/.zshrc
      symlink ${ROOT}/etc/zshrc /etc/zshrc
- name: linkShouldRewriteDestPathWithSedRule
  context:
    directory: testdata/fixture/commands/tree-link-rewrite
  in:
    args: [link]
  want:
    stdOut: |
      mkdir(create): ${HOME}/.config
      mkdir(create): ${HOME}/.config/bar
      archive: ${HOME}/.local/share/che/backups/che-link-{{/.*/}}.tar.bz2
      ln(create): ${HOME}/.config/bar/a
    fsCalls:
      - symlink ${ROOT}/HOME/.config/foo/a ${HOME}/.config/bar/a
  notWant:
    stdOut:
      - ${HOME}/.config/foo
- name: copyShouldCopyMarkerFilesAndChownDaemonPlist
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [copy]
  want:
    stdOut: |
      mkdir(create): ${HOME}/.config
      mkdir(create): ${HOME}/.config/zsh
      archive: ${HOME}/.local/share/che/backups/che-copy-{{/.*/}}.tar.bz2
      cp(create): ${HOME}/.config/zsh/c
      cp(create): /Library/LaunchDaemons/otelcol.plist
      cp(chown): root:wheel /Library/LaunchDaemons/otelcol.plist
    fsCalls: |
      archive ${HOME}/.local/share/che/backups/che-copy-{{/.*/}}.tar.bz2
      copy ${ROOT}/HOME/.config/zsh/c.ontoHost.cp ${HOME}/.config/zsh/c 0000
      copy ${ROOT}/Library/LaunchDaemons/otelcol.plist.ontoHost.cp /Library/LaunchDaemons/otelcol.plist 0644
      chown root:wheel /Library/LaunchDaemons/otelcol.plist
- name: renderTemplatesShouldRenderOnlyHostDestsForHostProfile
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [render-templates]
  want:
    stdOut: |
      archive: ${HOME}/.local/share/che/backups/che-render-{{/.*/}}.tar.bz2
      render(create): ${HOME}/.config/zsh/t
    fsCalls: |
      archive ${HOME}/.local/share/che/backups/che-render-{{/.*/}}.tar.bz2
      install ${HOME}/.config/zsh/t 0000
  notWant:
    stdOut:
      - docs/r.md
- name: renderTemplatesShouldRenderOnlyRepoDestsForOntoRepoProfile
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [render-templates]
    profile: ontoRepo
  want:
    stdOut: |
      render(create): ${REPO}/docs/r.md
  notWant:
    stdOut:
      - ${HOME}/.config/zsh/t
    fsCalls:
      - install
- name: mkDirsShouldCreateConfigDirsAndReapplySetgidChmod
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [mk-dirs]
  want:
    stdOut: |
      mkdir(create): ${HOME}/.config
      mkdir(create): ${HOME}/.config/zsh
      mkdir(create): ${HOME}/.cache/zsh
      mkdir(create): /var/log/che-test-setgid
      mkdir(chmod): 2775 /var/log/che-test-setgid
    fsCalls: |
      mkdir ${HOME}/.config
      mkdir ${HOME}/.config/zsh
      mkdir -p ${HOME}/.cache/zsh
      mkdir -p -m 2775 /var/log/che-test-setgid
      chmod 2775 /var/log/che-test-setgid
- name: pruneLinksShouldScanRootAndRemoveNothingOnFreshTree
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [prune-links]
  want:
    stdOut: |
      prune-links: ${ROOT}
  notWant:
    fsCalls:
      - remove
- name: runScriptsShouldExecEachScriptAndReportOk
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [run-scripts]
  want:
    stdOut: |
      run-scripts: ${REPO}/install/unit
      run-scripts(report): ok ${REPO}/install/unit
    cmds:
      - ${REPO}/install/unit
- name: runScriptsShouldNarrowToMatchingName
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [run-scripts, unit]
  want:
    stdOut: |
      run-scripts: ${REPO}/install/unit
    cmds:
      - ${REPO}/install/unit
- name: runScriptsShouldErrorWhenNameMatchesNothing
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [run-scripts, __nope__]
  want:
    error: true
  notWant:
    cmds:
      - ${REPO}/install/unit
- name: servicesBootoutShouldUnloadLoadedSystemDomainService
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [services, bootout]
  want:
    stdOut: |
      bootout: system/otelcol
    cmds: |
      {{/(sudo )?/}}launchctl print system/otelcol
      {{/(sudo )?/}}launchctl bootout system/otelcol
      {{/(sudo )?/}}launchctl print system/otelcol
- name: servicesBootinShouldBootstrapSystemDomainService
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [services, bootin]
  want:
    stdOut: |
      bootstrap: system/otelcol
    cmds:
      - launchctl bootstrap system /Library/LaunchDaemons/otelcol.plist
- name: servicesEnsureShouldSettleThenReportRunningPid
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [services, ensure]
  want:
    stdOut: |
      settle: 15s before pid check
      running: system/otelcol (pid 4242)
    cmds:
      - launchctl print system/otelcol
- name: detectShouldPrintOnlyTheResolvedProfile
  context:
    directory: testdata/fixture/commands/tree-che-repo
  in:
    args: [detect]
  want:
    stdOut: |
      ${PROFILE}
