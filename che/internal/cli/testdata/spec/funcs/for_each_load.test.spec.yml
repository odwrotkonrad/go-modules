# [>] 🤖🤖
context:
  function: cli.loader.forEachLoad
  mockedInterfaces:
    execx.CmdExecutor: testutil.CmdMockExecutor
cases:
  - name: ShouldWarnOnPluginSpecViolationByDefault
    input:
      args:
        - pluginFiles:
            che.yml: |
              p:
                includes:
                  link: [HOME/**]
        - hostFiles:
            che.yml: |
              main:
                options: {autoDiscover: true}
                plugins: ["${REF}"]
        - ref: ${PLUGIN_DIR}::p
    expected:
      stdOut:
        - validate(che.yml)
        - includes
      output:
        ranLoads: 2
  - name: ShouldFailOnPluginSpecViolationInErrorMode
    context:
      env: {CHE_VALIDATE_SPEC: error}
    input:
      args:
        - pluginFiles:
            che.yml: |
              p:
                includes:
                  link: [HOME/**]
        - hostFiles:
            che.yml: |
              main:
                options: {autoDiscover: true}
                plugins: ["${REF}"]
        - ref: ${PLUGIN_DIR}::p
    expected:
      errorOutput: includes
      output:
        ranLoads: 1
  - name: ShouldBuildDeferredPluginRepoFromGitRefAtCacheCheckout
    context:
      env: {PLUGIN_GATE: "1", CHE_DEBUG: "1"}
    input:
      args:
        - pluginFiles:
            che.yml: |
              gitlabGroup:
                options:
                  execIf: ['env:PLUGIN_GATE']
                include:
                  runScripts: [scripts/bootstrap.zsh]
            scripts/bootstrap.zsh: "#!/bin/zsh\n"
        - hostFiles:
            che.yml: |
              main:
                options: {autoDiscover: true}
                plugins: ["${REF}"]
                include:
                  runScripts: [scripts/local.zsh]
            scripts/local.zsh: "#!/bin/zsh\n"
        - ref: "@file://${PLUGIN_DIR}::gitlabGroup"
    expected:
      stdOut:
        - run ${REF}
        - cloned file://${PLUGIN_DIR}
        - 'execIf(pass): profile gitlabGroup: env:PLUGIN_GATE'
      output:
        ranLoads: 2
        pluginRefs: 1
        ref: ${REF}
        repoRootUnder: ${CACHE}
        script: scripts/bootstrap.zsh
  - name: ShouldSkipPluginRepoWhenRemoteExecIfFails
    context:
      env: {PLUGIN_GATE: "", CHE_DEBUG: ""}
    input:
      args:
        - pluginFiles:
            che.yml: |
              gitlabGroup:
                options:
                  execIf: ['env:PLUGIN_GATE']
                include:
                  runScripts: [scripts/bootstrap.zsh]
            scripts/bootstrap.zsh: "#!/bin/zsh\n"
        - hostFiles:
            che.yml: |
              main:
                options: {autoDiscover: true}
                plugins: ["${REF}"]
                include:
                  runScripts: [scripts/local.zsh]
            scripts/local.zsh: "#!/bin/zsh\n"
        - ref: "@file://${PLUGIN_DIR}::gitlabGroup"
    expected:
      stdOut: skip ${REF} (execIf failed)
      output:
        ranLoads: 1
    notExpected:
      stdOut:
        - execIf(reject)
        - run ${REF}
        - 'pull '
  - name: ShouldGateRemoteExecIfWithPluginEntryEnvWithoutLeaking
    input:
      args:
        - pluginFiles:
            che.yml: |
              gitlabGroup:
                options:
                  execIf: ['env:PLUGIN_GATE']
                include:
                  runScripts: [scripts/bootstrap.zsh]
            scripts/bootstrap.zsh: "#!/bin/zsh\n"
        - hostFiles:
            che.yml: |
              main:
                options: {autoDiscover: true}
                plugins:
                  - ref: "${REF}"
                    env:
                      PLUGIN_GATE: "1"
                include:
                  runScripts: [scripts/local.zsh]
            scripts/local.zsh: "#!/bin/zsh\n"
        - ref: "@file://${PLUGIN_DIR}::gitlabGroup"
        - knobs:
            sampleEnv: PLUGIN_GATE
            unsetEnv: [PLUGIN_GATE]
    expected:
      stdOut: 'execIf(pass): profile gitlabGroup: env:PLUGIN_GATE'
      output:
        ranLoads: 2
        env: {PLUGIN_GATE: "1"}
        envInOp: "1"
        script: scripts/bootstrap.zsh
  - name: ShouldSkipPluginsWithFlag
    input:
      args:
        - pluginFiles: {}
        - hostFiles:
            che.yml: |
              main:
                options: {autoDiscover: true}
                plugins: ["@file:///nonexistent::main"]
                include:
                  runScripts: [scripts/local.zsh]
            scripts/local.zsh: "#!/bin/zsh\n"
        - ref: ""
        - knobs:
            skipPlugins: true
    expected:
      output:
        ranLoads: 1
        pluginRefs: 0
    notExpected:
      stdOut: plugin
  - name: ShouldSkipPluginsWithEnv
    context:
      env: {CHE_SKIP_PLUGINS: "1"}
    input:
      args:
        - pluginFiles: {}
        - hostFiles:
            che.yml: |
              main:
                options: {autoDiscover: true}
                plugins: ["@file:///nonexistent::main"]
                include:
                  runScripts: [scripts/local.zsh]
            scripts/local.zsh: "#!/bin/zsh\n"
        - ref: ""
    expected:
      output:
        ranLoads: 1
        pluginRefs: 0
    notExpected:
      stdOut: plugin
  - name: ShouldAnchorDirRefPluginAtAbsoluteDir
    context:
      env: {CHE_DRY_RUN: all}
    input:
      args:
        - pluginFiles:
            che.yml: |
              gitlabGroup:
                include:
                  runScripts: [scripts/bootstrap.zsh]
            scripts/bootstrap.zsh: "#!/bin/zsh\n"
        - hostFiles:
            che.yml: |
              main:
                options: {autoDiscover: true}
                plugins: ["${REF}"]
                include:
                  runScripts: [scripts/local.zsh]
            scripts/local.zsh: "#!/bin/zsh\n"
        - ref: ${PLUGIN_DIR}::gitlabGroup
        - knobs:
            op: runScripts
    expected:
      stdOut:
        - 'run-scripts(dry-run=all,profile=gitlabGroup): '
        - scripts/bootstrap.zsh
      output:
        ranLoads: 2
        repoRoot: ${PLUGIN_DIR}
    notExpected:
      stdOut: [clone, pull]
  - name: ShouldAnchorDirRefPluginAtRepoRelativeDir
    context:
      env: {CHE_DRY_RUN: all}
    input:
      args:
        - pluginFiles: {}
        - hostFiles:
            che.yml: |
              main:
                options: {autoDiscover: true}
                plugins: ["${REF}"]
                include:
                  runScripts: [scripts/local.zsh]
            scripts/local.zsh: "#!/bin/zsh\n"
            plugin/che.yml: |
              gitlabGroup:
                include:
                  runScripts: [scripts/bootstrap.zsh]
            plugin/scripts/bootstrap.zsh: "#!/bin/zsh\n"
        - ref: ./plugin::gitlabGroup
        - knobs:
            op: runScripts
    expected:
      stdOut:
        - 'run-scripts(dry-run=all,profile=gitlabGroup): '
        - scripts/bootstrap.zsh
      output:
        ranLoads: 2
        repoRoot: ${HOST_REPO}/plugin
    notExpected:
      stdOut: [clone, pull]
  - name: ShouldAnchorDirRefPluginAtEnvVarDir
    context:
      env: {CHE_DRY_RUN: all}
    input:
      args:
        - pluginFiles:
            che.yml: |
              gitlabGroup:
                include:
                  runScripts: [scripts/bootstrap.zsh]
            scripts/bootstrap.zsh: "#!/bin/zsh\n"
        - hostFiles:
            che.yml: |
              main:
                options: {autoDiscover: true}
                plugins: ["${REF}"]
                include:
                  runScripts: [scripts/local.zsh]
            scripts/local.zsh: "#!/bin/zsh\n"
        - ref: $PLUGIN_DIR_REF::gitlabGroup
        - knobs:
            op: runScripts
    expected:
      stdOut:
        - 'run-scripts(dry-run=all,profile=gitlabGroup): '
        - scripts/bootstrap.zsh
      output:
        ranLoads: 2
        repoRoot: ${PLUGIN_DIR}
    notExpected:
      stdOut: [clone, pull]
  - name: ShouldContinuePastFailingRepoAndReportEachFailure
    input:
      args:
        - pluginFiles:
            che.yml: |
              gitlabGroup:
                include:
                  runScripts: [scripts/bootstrap.zsh]
            scripts/bootstrap.zsh: "#!/bin/zsh\n"
        - hostFiles:
            che.yml: |
              main:
                options: {autoDiscover: true}
                plugins: ["${REF}"]
                include:
                  runScripts: [scripts/local.zsh]
            scripts/local.zsh: "#!/bin/zsh\n"
        - ref: ${PLUGIN_DIR}::gitlabGroup
        - knobs:
            op: failLocal
    expected:
      errorOutput: 'local: local boom'
      stdOut: 'test(report): fail local: local boom'
      output:
        ranLoads: 2
# [<] 🤖🤖
