context:
  function: fsutil.ExpandBraces
cases:
  - name: expandBracesShouldReturnBracelessPathUnchanged
    input:
      args: [path: no/braces/here]
    expected:
      output: [no/braces/here]
  - name: expandBracesShouldExpandSingleGroup
    input:
      args: [path: "x/{a,b}/y"]
    expected:
      output: [x/a/y, x/b/y]
  - name: expandBracesShouldExpandCartesianProductOfTwoGroups
    input:
      args: [path: "{a,b}/{c,d}"]
    expected:
      output: [a/c, a/d, b/c, b/d]
  - name: expandBracesShouldFlattenNestedGroups
    input:
      args: [path: "x/{a,{b,c}}/y"]
    expected:
      output: [x/a/y, x/b/y, x/c/y]
