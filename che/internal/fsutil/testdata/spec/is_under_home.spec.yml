- name: isUnderHomeShouldAcceptHomeItself
  in:
    args: [/Users/x]
  want: true
- name: isUnderHomeShouldAcceptDirectChild
  in:
    args: [/Users/x/.config]
  want: true
- name: isUnderHomeShouldRejectPrefixOnlySibling
  in:
    args: [/Users/xyz]
  want: false
- name: isUnderHomeShouldRejectPathOutsideHome
  in:
    args: [/etc/zshrc]
  want: false
- name: isUnderHomeShouldAcceptDeepChild
  in:
    args: [/Users/x/a/b/c]
  want: true
