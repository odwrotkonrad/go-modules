- name: no_braces
  in:
    args: [no/braces/here]
  want: [no/braces/here]
- name: single_group
  in:
    args: ["x/{a,b}/y"]
  want: [x/a/y, x/b/y]
- name: two_groups
  in:
    args: ["{a,b}/{c,d}"]
  want: [a/c, a/d, b/c, b/d]
- name: nested_group
  in:
    args: ["x/{a,{b,c}}/y"]
  want: [x/a/y, x/b/y, x/c/y]
