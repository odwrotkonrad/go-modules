context:
  function: fsutil.ResolveConfigHome
cases:
  - name: ShouldUseCheOverrideDirectlyNoSuffix
    context:
      env: {CHE_CONFIG_HOME: /o, XDG_CONFIG_HOME: /x}
    expected:
      output: /o
  - name: ShouldAppendCheToXdgBase
    context:
      env: {CHE_CONFIG_HOME: "", XDG_CONFIG_HOME: /x}
    expected:
      output: /x/che
  - name: ShouldFallBackToHomeConfigChe
    context:
      env: {CHE_CONFIG_HOME: "", XDG_CONFIG_HOME: ""}
    expected:
      output: /h/.config/che
