- name: mkdirShouldBuildPlainArgvUnderHomeWithParents
  in:
    op: mkdir
    args: [/Users/x/.config/foo, "0755"]
    parents: true
  want:
    argv: mkdir -p -m 0755 /Users/x/.config/foo
- name: mkdirShouldUseSudoOutsideHome
  in:
    op: mkdir
    args: [/etc/foo, "0"]
    parents: false
  want:
    argv: sudo mkdir /etc/foo
- name: symlinkShouldBuildPlainArgvUnderHome
  in:
    op: symlink
    args: [/repo/root/HOME/.config/foo, /Users/x/.config/foo]
  want:
    argv: ln -fs ${NODEREF} /repo/root/HOME/.config/foo /Users/x/.config/foo
- name: symlinkShouldUseSudoOutsideHome
  in:
    op: symlink
    args: [/repo/root/etc/zshrc, /etc/zshrc]
  want:
    argv: sudo ln -fs ${NODEREF} /repo/root/etc/zshrc /etc/zshrc
- name: copyShouldInstallWithModeUnderHome
  in:
    op: copy
    args: [/repo/root/HOME/.config/foo/f, /Users/x/.config/foo/f, "0644"]
  want:
    argv: install -m 0644 /repo/root/HOME/.config/foo/f /Users/x/.config/foo/f
- name: copyShouldUseSudoAndOmitZeroModeOutsideHome
  in:
    op: copy
    args: [/repo/root/etc/grafana/g.ini, /etc/grafana/g.ini, "0"]
  want:
    argv: sudo install /repo/root/etc/grafana/g.ini /etc/grafana/g.ini
- name: removeShouldRmForceUnderHome
  in:
    op: remove
    args: [/Users/x/.config/foo/dead]
  want:
    argv: rm -f /Users/x/.config/foo/dead
- name: removeShouldUseSudoOutsideHome
  in:
    op: remove
    args: [/etc/stale]
  want:
    argv: sudo rm -f /etc/stale
- name: chownShouldBuildPlainArgvUnderHome
  in:
    op: chown
    args: ["ko:staff", /Users/x/.config/foo]
  want:
    argv: chown ko:staff /Users/x/.config/foo
- name: chownShouldUseSudoOutsideHome
  in:
    op: chown
    args: [root, /etc/foo]
  want:
    argv: sudo chown root /etc/foo
- name: chmodShouldApplySpecialBitsWithSudoOutsideHome
  in:
    op: chmod
    args: ["2775", /etc/foo]
  want:
    argv: sudo chmod 2775 /etc/foo
- name: installShouldPassOwnerFlagWhenOwnerSet
  in:
    op: install
    args: [/Users/x/.config/foo/rendered, "0600", "ko:staff"]
    body: "SECRET\n"
  want:
    argv: install -m 0600 -o ko -g staff {{/\S+/}} /Users/x/.config/foo/rendered
    body: "SECRET\n"
- name: installShouldOmitOwnerFlagWhenOwnerEmpty
  in:
    op: install
    args: [/Users/x/.config/foo/rendered, "0644", ""]
    body: "hello\n"
  want:
    argv: install -m 0644 {{/\S+/}} /Users/x/.config/foo/rendered
    body: "hello\n"
- name: installShouldUseSudoOutsideHome
  in:
    op: install
    args: [/etc/rendered, "0", ""]
    body: "x\n"
  want:
    argv: sudo install {{/\S+/}} /etc/rendered
    body: "x\n"
