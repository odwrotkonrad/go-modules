# [>] 🤖🤖
context:
  command: che backup
  mockedInterfaces:
    execx.CmdExecutor: testutil.CmdMockExecutor
    fsutil.FileSystemWriter: testutil.FileSystemMockWriter
    fsutil.FileSystemReader: testutil.FileSystemMockReader
cases:
  - name: ShouldLogOnlyShowDeltaWithoutExistingDests
    expected:
      stdOut: |
        backup delta {{/.*/}}
    notExpected:
      stdOut:
        - 'created {{/\S*/}}che-backup'
  - name: ShouldLogOnlyShowDeltaForSettledDests
    input:
      args: [settleLink: true]
    expected:
      stdOut: |
        backup delta make-links (1 change), make-copies (2 changes), render-templates (1 change)
    notExpected:
      stdOut:
        - 'created {{/\S*/}}che-backup'
  - name: ShouldArchiveOnlyDestsThatWouldChange
    input:
      args: [driftLink: true]
    expected:
      stdOut: |
        backup delta make-links ({{/[0-9]+/}} change{{/s?/}}), make-copies ({{/[0-9]+/}} change{{/s?/}}), render-templates ({{/[0-9]+/}} change{{/s?/}})
          created {{/.*/}}B, ${HOME}/.local/state/che/backups/che-backup-{{/.*/}}.tar.bz2
# [<] 🤖🤖
