# [>] 🤖
context:
  command: che run-scripts
  mockedInterfaces:
    execx.CmdExecutor: testutil.CmdMockExecutor
    fsutil.FileSystemWriter: testutil.FileSystemMockWriter
    fsutil.FileSystemReader: testutil.FileSystemMockReader
cases:
  - name: ShouldExecEachScriptAndReportOk
    expected:
      stdOut: |
        ran ${REPO}/install/setup
  - name: ShouldReportFailAndReturnError
    input:
      args: [failCmds: [install/setup]]
    expected:
      exitCode: 1
      stdErr:
        - 'scripts failed: '
      stdOut: |
        fail ${REPO}/install/setup: stub: fail install/setup
        failed ${REPO}/install/setup
# [<] 🤖
