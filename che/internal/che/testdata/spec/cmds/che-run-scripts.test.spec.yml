# [>] 🤖
context:
  command: che run-scripts
  mockedInterfaces:
    execx.CmdExecutor: testutil.CmdMockExecutor
    fsutil.FileSystemWriter: testutil.FileSystemMockWriter
    fsutil.FileSystemReader: testutil.FileSystemMockReader
    fsutil.Sleep: testutil.SleepMock
cases:
  - name: ShouldExecEachScriptAndReportOk
    expected:
      stdOut: |
        run-scripts: ${REPO}/install/setup
        run-scripts(report): ok ${REPO}/install/setup
  - name: ShouldReportFailAndReturnError
    input:
      args: [failCmds: [install/setup]]
    expected:
      exitCode: 1
      stdErr:
        - 'scripts failed: '
      stdOut: |
        run-scripts(fail): ${REPO}/install/setup: stub: fail install/setup
        run-scripts(report): fail ${REPO}/install/setup
# [<] 🤖
