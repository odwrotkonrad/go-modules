cases:
  - name: ShouldOnlyReportLinkCreates
    context: {command: che make-links}
    expected:
      stdOut: "will not create ${HOME}/.config/zsh/{{/\\S+/}}: dry run (delta)"
  - name: ShouldOnlyReportCopyCreates
    context: {command: che make-copies}
    expected:
      stdOut: "will not create ${HOME}/.config/zsh/{{/\\S+/}}: dry run (delta)"
  - name: ShouldOnlyReportRenderCreates
    context: {command: che render-templates}
    expected:
      stdOut: "will not create ${HOME}/.config/zsh/{{/\\S+/}}: dry run (delta)"
  - name: ShouldOnlyReportMkdirCreates
    context: {command: che make-dirs}
    expected:
      stdOut: "will not create ${HOME}/.config: dry run (delta)"
  - name: ShouldReportBackupArchivePrediction
    context: {command: che backup}
    input:
      args: [driftLink: true]
    expected:
      stdOut: |
        backup delta {{/.*/}}
        will not create {{/.*/}}che-backup-{{/.*/}}.tar.bz2: dry run (delta)
    notExpected:
      stdOut:
        - 'created {{/\S*/}}che-backup'
  - name: ShouldReportNothingForPrune
    context: {command: che prune-broken-links}
    notExpected:
      stdOut:
        - 'prune-link'
  - name: ShouldOnlyReportScriptRuns
    context: {command: che run-scripts}
    expected:
      stdOut: "will not run ${REPO}/install/setup: dry run (delta)"
