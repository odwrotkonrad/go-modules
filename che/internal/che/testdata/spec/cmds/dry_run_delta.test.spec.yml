cases:
  - name: ShouldOnlyReportLinkCreates
    context: {command: che make-links}
    expected:
      stdOut: "make-links(create, skippedDue[config.dryRun=delta]): ${HOME}/.config/zsh/"
  - name: ShouldOnlyReportCopyCreates
    context: {command: che make-copies}
    expected:
      stdOut: "make-copies(create, skippedDue[config.dryRun=delta]): ${HOME}/.config/zsh/"
  - name: ShouldOnlyReportRenderCreates
    context: {command: che render-templates}
    expected:
      stdOut: "render-templates(create, skippedDue[config.dryRun=delta]): ${HOME}/.config/zsh/"
  - name: ShouldOnlyReportMkdirCreates
    context: {command: che make-dirs}
    expected:
      stdOut: "make-dirs(create, skippedDue[config.dryRun=delta]): ${HOME}/.config"
  - name: ShouldReportBackupArchivePrediction
    context: {command: che backup}
    expected:
      stdOut: |
        backup(showDelta): {{/.*/}}
        backup(created): {{/.*/}}che-backup-{{/.*/}}.tar.bz2
  - name: ShouldReportNothingForPrune
    context: {command: che prune-broken-links}
    notExpected:
      stdOut:
        - 'prune-link'
  - name: ShouldOnlyReportScriptRuns
    context: {command: che run-scripts}
    expected:
      stdOut: "run-scripts: ${REPO}/install/setup"
