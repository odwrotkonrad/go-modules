context:
  function: che.ProfileReady.toDest
cases:
  - name: ShouldMapBareHomeTokenToSystemRoot
    input:
      args: [rel: _home]
    expected:
      output: /_home
  - name: ShouldMapHomePrefixedRelToSystemRoot
    input:
      args: [rel: _home/.config/zsh]
    expected:
      output: /_home/.config/zsh
  - name: ShouldMapBareRelToRootAbsolutePath
    input:
      args: [rel: etc/zshrc]
    expected:
      output: /etc/zshrc
  - name: ShouldKeepAbsoluteCachePathAsIs
    input:
      args: [rel: /var/custom/cache/dir_size_exporter]
    expected:
      output: /var/custom/cache/dir_size_exporter
  - name: ShouldKeepAbsoluteLogPathAsIs
    input:
      args: [rel: /var/log/otelcol]
    expected:
      output: /var/log/otelcol
  - name: ShouldExpandHomeEnvVarInDest
    input:
      args: [rel: $HOME/.config/zsh]
    expected:
      output: /Users/x/.config/zsh
  - name: ShouldExpandBracedHomeEnvVarInDest
    input:
      args: [rel: "${HOME}/.ssh"]
    expected:
      output: /Users/x/.ssh
  - name: ShouldMapBareHomeEnvVarToHomeDir
    input:
      args: [rel: $HOME]
    expected:
      output: /Users/x
# [<] 🤖🤖
