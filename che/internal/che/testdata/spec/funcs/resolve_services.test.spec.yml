context:
  function: che.ProfileReady.resolveServices
cases:
  - name: ShouldResolveDomainSudoAndPlistPerServiceKind
    input:
      args:
        - names: [otelcol, gitlab-runner, load-defaults-config]
    expected:
      output:
        - {domain: system, sudo: true, plist: /Library/LaunchDaemons/otelcol.plist, longRunning: true}
        - {domain: "${GUI}", sudo: false, plist: /Library/LaunchAgents/gitlab-runner.plist, longRunning: true}
        - {domain: "${GUI}", sudo: false, plist: /Users/x/Library/LaunchAgents/load-defaults-config.plist, longRunning: true}
  - name: ShouldErrorOnUnknownService
    input:
      args:
        - names: [nope]
    expected:
      errorOutput: 'unknown service "nope": no plist under root/'
