# [>] 🤖🤖
context:
  function: che.ProfileReady.renderTemplates
cases:
  - name: ShouldWriteHeaderAndRenderedBodyToRepoDest
    input:
      args:
        - tree:
            templates/x.ontoRepo.tpl: |
              hello {{ "world" }}
        - items:
            - {rel: templates/x.ontoRepo.tpl, dests: [out.md]}
    expected:
      output:
        files:
          out.md: |
            <!-- autogenerated using templates/x.ontoRepo.tpl -->
            hello world
  - name: ShouldMergeUpsertRepoDestStably
    input:
      args:
        - tree:
            templates/env.ontoRepo.tpl: |
              B=default
              A=default
            .env: |
              B=kept
              C=extra
        - items:
            - rel: templates/env.ontoRepo.tpl
              dests:
                - {path: .env, options: {writeType: mergeUpsert}}
    expected:
      output:
        rerun: true
        rerunStdOut:
          - 'debug render-templates(overwrite, skippedDue[SameContent]): ${ROOT}/'
        files:
          .env: |
            A=default
            B=kept
            C=extra
  - name: ShouldMergeUpsertHostDest
    input:
      args:
        - tree:
            root/_home/env.ontoHost.tpl: |
              B=default
              A=default
            home/.env: |
              B=kept
              C=extra
        - items:
            - rel: _home/env.ontoHost.tpl
              dests:
                - {path: "~/.env", options: {writeType: mergeUpsert}}
    expected:
      output:
        files:
          home/.env: |
            A=default
            B=kept
            C=extra
  - name: ShouldRenderRawBodyToDerivedHostDest
    input:
      args:
        - tree:
            root/_home/.config/zsh/t.ontoHost.tpl: |
              hello {{ "world" }}
        - dirs: [home/.config/zsh]
        - items:
            - {rel: _home/.config/zsh/t.ontoHost.tpl, dests: [$HOME/.config/zsh/t], derived: true}
    expected:
      output:
        files:
          home/.config/zsh/t: |
            hello world
  - name: ShouldInlineAtIncludesOnlyForOptingDest
    input:
      args:
        - tree:
            templates/agents.ontoRepo.tpl: |
              @inc.md
            inc.md: |
              INLINED
        - items:
            - rel: templates/agents.ontoRepo.tpl
              dests:
                - CLAUDE.md
                - {path: AGENTS.md, options: {renderReferencedFiles: true}}
    expected:
      output:
        contains:
          CLAUDE.md: ["@inc.md"]
          AGENTS.md: [INLINED]
        notContains:
          AGENTS.md: ["@inc.md"]
  - name: ShouldContinueAfterFailingTemplateAndReturnError
    input:
      args:
        - tree:
            templates/ok.ontoRepo.tpl: |
              fine
        - items:
            - {rel: templates/missing.ontoRepo.tpl, dests: [bad.md]}
            - {rel: templates/ok.ontoRepo.tpl, dests: [ok.md]}
    expected:
      errorOutput: "templates/missing.ontoRepo.tpl: no such file or directory"
      stdOut:
        - "render-templates(fail): templates/missing.ontoRepo.tpl: "
        - "render-templates(created): ${ROOT}/ok.md"
      output:
        contains:
          ok.md: [fine]
        absent: [bad.md]
  - name: ShouldSkipSecretRefSource
    input:
      args:
        - tree:
            templates/s.ontoRepo.tpl: |
              TOKEN={{ op "op://x/y/z" }}
        - items:
            - {rel: templates/s.ontoRepo.tpl, dests: [out]}
        - skipSecrets: true
    expected:
      stdOut: "debug render-templates(create, skippedDue[config.renderTemplates.skipSecrets]): ${ROOT}/out"
      output:
        absent: [out]
  - name: ShouldRenderRemoteSourceWithCtx
    context:
      mockedInterfaces:
        che.RemoteFetcher: testutil.RemoteMockFetcher
    input:
      args:
        - fetch:
            gitlab.com/acme/tools//snippets/agent.md: |
              name: RO-{{ .repo }}
        - items:
            - rel: "@gitlab.com/acme/tools//snippets/agent.md"
              ctx: {repo: Notes}
              dests:
                - {path: .claude/agents/ro.md, options: {skipAutoGeneratedHeader: true}}
    expected:
      output:
        files:
          .claude/agents/ro.md: |
            name: RO-Notes
  - name: ShouldSkipRemoteSecretRefSource
    context:
      mockedInterfaces:
        che.RemoteFetcher: testutil.RemoteMockFetcher
    input:
      args:
        - fetch:
            gitlab.com/acme/tools//snippets/s.md: |
              TOKEN={{ op "op://x/y/z" }}
        - items:
            - {rel: "@gitlab.com/acme/tools//snippets/s.md", dests: [out]}
        - skipSecrets: true
    expected:
      stdOut: "debug render-templates(create, skippedDue[config.renderTemplates.skipSecrets]): ${ROOT}/out"
      output:
        absent: [out]
  - name: ShouldFailOnRemoteFetchError
    context:
      mockedInterfaces:
        che.RemoteFetcher: testutil.RemoteMockFetcher
    input:
      args:
        - fetch: {}
        - items:
            - {rel: "@gitlab.com/acme/tools//snippets/absent.md", dests: [out]}
    expected:
      errorOutput: 'RemoteMockFetcher: no fixture for "gitlab.com/acme/tools//snippets/absent.md"'
      stdOut: "render-templates(fail): @gitlab.com/acme/tools//snippets/absent.md: "
      output:
        absent: [out]
# [<] 🤖🤖
