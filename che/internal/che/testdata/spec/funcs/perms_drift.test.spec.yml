context:
  function: che.ProfileReady.mkDirs
cases:
  - name: ShouldReportAndFixChmodDrift
    input:
      args: [mkMode: "0700", chmod: "0755"]
    expected:
      output:
        deltaLine: "make-dirs(chmod, skippedDue[config.dryRun=delta]): 0755 ${DEST}"
        wetPerm: "0755"
  - name: ShouldStaySilentForSettledSetgid
    input:
      args: [mkMode: "0775", setBits: setgid, chmod: "2775"]
    expected:
      output: {settled: true}
  - name: ShouldStaySilentForSettledSticky
    input:
      args: [mkMode: "0777", setBits: sticky, chmod: "1777"]
    expected:
      output: {settled: true}
  - name: ShouldAddMissingSetgidBit
    input:
      args: [mkMode: "0775", chmod: "2775"]
    expected:
      output:
        deltaLine: "make-dirs(chmod, skippedDue[config.dryRun=delta]): 2775 ${DEST}"
        wetPerm: "0775"
        wetSetgid: true
