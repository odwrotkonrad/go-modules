# [>] 🤖🤖
- name: msgShouldSplitPlainTitleIntoTypeAndText
  in:
    title: ln
    msg: /etc/zshrc
    mode: off
  want:
    type: ln
    subtype: ""
    text: /etc/zshrc
- name: msgShouldExtractParenthesizedSubtype
  in:
    title: render(skip-secrets)
    msg: /x
    mode: off
  want:
    type: render
    subtype: (skip-secrets)
    text: /x
- name: msgShouldAppendDryRunDeltaSubtype
  in:
    title: cp
    msg: /x
    mode: delta
  want:
    type: cp
    subtype: (dry-run=delta)
    text: /x
- name: msgShouldAppendDryRunAllSubtype
  in:
    title: cp
    msg: /x
    mode: all
  want:
    type: cp
    subtype: (dry-run=all)
    text: /x
- name: msgShouldCombineTitleSubtypeWithDryRun
  in:
    title: render(skip-secrets)
    msg: /x
    mode: delta
  want:
    type: render
    subtype: (skip-secrets,dry-run=delta)
    text: /x
- name: msgSubShouldAppendSubAfterDryRun
  in:
    fn: msgSub
    title: run-scripts
    msg: /x
    mode: all
    sub: profile=gitlabGroup
  want:
    type: run-scripts
    subtype: (dry-run=all,profile=gitlabGroup)
    text: /x
- name: msgSubShouldAppendSubAfterTitleSubtype
  in:
    fn: msgSub
    title: mkdir(create)
    msg: /x
    mode: off
    sub: profile=p
  want:
    type: mkdir
    subtype: (create,profile=p)
    text: /x
- name: msgSubShouldIgnoreEmptySub
  in:
    fn: msgSub
    title: ln
    msg: /x
    mode: off
    sub: ""
  want:
    type: ln
    subtype: ""
    text: /x
- name: debugShouldPrintLikeMsg
  in:
    fn: debug
    title: plugin(p)
    msg: run x
    mode: off
  want:
    type: plugin
    subtype: (p)
    text: run x
# [<] 🤖🤖
