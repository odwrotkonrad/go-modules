context:
  function: options.Options.Resolve
cases:
  - name: ShouldReportOnlyDefaultsAsEmptyDelta
    expected:
      output:
        delta: ""
  - name: ShouldReportFlagEnvConfigSpecSources
    context:
      env: {CHE_LOG_LEVEL: debug}
    input:
      args:
        - flags: {dryRun: delta}
        - user: {skipRemoteRefs: true}
        - spec: {profileWorkingDirectory: root}
    expected:
      output:
        delta: "dryRun=delta (cliFlag), profileWorkingDirectory=root (specFile), skipRemoteRefs=true (config-file), logLevel=debug (env)"
  - name: ShouldReportEveryOptionWithSourceInAll
    input:
      args:
        - flags: {}
        - user: {}
        - spec: {}
    expected:
      output:
        allContains:
          - "dryRun=false (default)"
          - "skipOps=[] (default)"
          - "autoDiscover=true (default)"
          - "validateSpec=warn (default)"
          - "logLevel=info (default)"
          - "otel.protocol=grpc (default)"
          - "otel.endpoint=localhost:4317 (default)"
          - "otel.metrics=true (default)"
