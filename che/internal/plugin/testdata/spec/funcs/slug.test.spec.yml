# [>] 🤖🤖
context:
  function: plugin.slug
cases:
  - name: ShouldSlugScpLikeSshUrl
    input:
      args: [url: "git@gitlab.com:konradodwrot/workspace.git"]
    expected:
      output: gitlab.com-konradodwrot-workspace
  - name: ShouldSlugHttpsUrl
    input:
      args: [url: https://gitlab.com/a/b.git]
    expected:
      output: gitlab.com-a-b
  - name: ShouldSlugSshSchemeUrl
    input:
      args: [url: ssh://git@gitlab.com/a/b.git]
    expected:
      output: gitlab.com-a-b
  - name: ShouldSlugFileUrl
    input:
      args: [url: file:///tmp/x]
    expected:
      output: tmp-x
# [<] 🤖🤖
