context:
  function: testyml.Context.CommandArgs
cases:
  - name: ShouldReturnArgvPastBinary
    input:
      args: [command: che services bootout]
    expected:
      output: [services, bootout]
  - name: ShouldReturnNilForBareBinary
    input:
      args: [command: che]
    expected:
      output: null
  - name: ShouldReturnNilForEmptyCommand
    input:
      args: []
    expected:
      output: null
