context:
  function: testyml.Expected.Check
cases:
  - name: checkShouldAcceptNilErrorWhenNoErrorWanted
    input:
      args: []
    expected:
      exitCode: 0
  - name: checkShouldMatchCodedErrorCodeAndMessage
    input:
      args: [code: 13, msg: "file not found: x"]
    expected:
      exitCode: 13
      errorOutput: [file not found]
  - name: checkShouldAcceptWantedPlainError
    input:
      args: [code: 1, msg: plain failure]
    expected:
      errorOutput: [plain failure]
