- name: multiline_literal_block
  in:
    args: ["line one (raw)\nline two $x\nln(create): /etc/zshrc\n"]
  want:
    stdOut: |
      line one (raw)
      line two $x
- name: inline_regex_hole
  in:
    args: ["ln(create): /etc/zshrc"]
  want:
    stdOut: ['ln(create): /etc/{{\w+}}']
