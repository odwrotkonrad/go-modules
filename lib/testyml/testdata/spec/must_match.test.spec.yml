context:
  function: testyml.MustMatch
cases:
  - name: mustMatchShouldMatchMultilineLiteralBlock
    input:
      args: [s: "line one (raw)\nline two $x\nln(create): /etc/zshrc\n"]
    expected:
      stdOut: |
        line one (raw)
        line two $x
  - name: mustMatchShouldMatchInlineRegexHole
    input:
      args: [s: "ln(create): /etc/zshrc"]
    expected:
      stdOut: ['ln(create): /etc/{{/\w+/}}']
  - name: mustNotMatchShouldRejectNonMatchingMatchers
    input:
      args: [s: "cp: /x"]
    expected:
      stdOut: ["cp: /x"]
    notExpected:
      stdOut: ["ln(create)", 'rm: /etc/{{/\w+/}}']
