# [>] 🤖🤖
context:
  function: yamlcfg.LoadConfigNode
cases:
  - name: ShouldExit13WhenNoConfigExists
    input:
      args: []
    expected:
      exitCode: 13
  - name: ShouldExit12OnInvalidYaml
    input:
      args: [user: testdata/fixture/load_config/invalid.yml]
    expected:
      exitCode: 12
      errorOutput: [invalid config]
  - name: ShouldLoadUserOnlyConfig
    input:
      args: [user: testdata/fixture/load_config/user_only.yml]
    expected:
      files: testdata/fixture/load_config/user_only.expected.yml
  - name: ShouldDeepMergeSystemAndUser
    input:
      args: [user: testdata/fixture/load_config/merge_user.yml, system: testdata/fixture/load_config/merge_system.yml]
    expected:
      files: testdata/fixture/load_config/merge.expected.yml
  - name: ShouldReturnNilNodeForEmptyFiles
    input:
      args: [user: testdata/fixture/load_config/empty.yml]
    expected:
      exitCode: 0
  - name: ShouldExit12WhenUserConfigUnreadable
    input:
      args: [unreadable: true]
    expected:
      exitCode: 12
# [<] 🤖🤖
