context:
  function: yamlcfg.LoadConfig
cases:
  - name: loadConfigShouldDecodeIntoTypedMap
    input:
      args: [user: testdata/fixture/load_config/user_only.yml]
    expected:
      files: testdata/fixture/load_config/user_only.expected.yml
  - name: loadConfigShouldExit12OnTypeMismatch
    input:
      args: [user: testdata/fixture/load_config/decode_mismatch.yml]
    expected:
      exitCode: 12
      errorOutput: [invalid config]
  - name: loadConfigShouldLeaveOutputUntouchedForEmptyConfig
    input:
      args: [user: testdata/fixture/load_config/empty.yml]
    expected:
      exitCode: 0
  - name: loadConfigShouldExit13WhenConfigMissing
    input:
      args: []
    expected:
      exitCode: 13
# [<] 🤖🤖
