- name: loadConfigShouldDecodeIntoTypedMap
  in:
    user: testdata/fixture/load_config/user_only.yml
  want:
    filesOut: testdata/fixture/load_config/user_only.expected.yml
- name: loadConfigShouldExit12OnTypeMismatch
  in:
    user: testdata/fixture/load_config/decode_mismatch.yml
  want:
    exitCode: 12
    stdErr: [invalid config]
- name: loadConfigShouldLeaveOutputUntouchedForEmptyConfig
  in:
    user: testdata/fixture/load_config/empty.yml
  want:
    exitCode: 0
- name: loadConfigShouldExit13WhenConfigMissing
  in: {}
  want:
    exitCode: 13
