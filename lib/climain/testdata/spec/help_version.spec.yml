- name: helpVersionShouldPrintUsageForLongHelpFlag
  in:
    args: ["--help"]
  want:
    out: usage text
    done: true
- name: helpVersionShouldPrintUsageForShortHelpFlag
  in:
    args: ["-h"]
  want:
    out: usage text
    done: true
- name: helpVersionShouldPrintVersionForLongVersionFlag
  in:
    args: ["--version"]
  want:
    out: tool version 1.2.3
    done: true
- name: helpVersionShouldPrintVersionForShortVersionFlag
  in:
    args: ["-v"]
  want:
    out: tool version 1.2.3
    done: true
- name: helpVersionShouldNotHandleEmptyArgs
  in:
    args: []
  want:
    out: ""
    done: false
- name: helpVersionShouldNotHandleOtherArg
  in:
    args: ["any"]
  want:
    out: ""
    done: false
- name: helpVersionShouldNotHandleHelpWithExtraArg
  in:
    args: ["--help", "x"]
  want:
    out: ""
    done: false
