workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - validate
  - test
  - release

variables:
  CI_IMAGE: registry.gitlab.com/konradodwrot/infra/oci-images/ci-linux:latest
  GOMODCACHE: $CI_PROJECT_DIR/.cache/go-mod
  GOCACHE: $CI_PROJECT_DIR/.cache/go-build

validate-pre-commit-all:
  stage: validate
  image: $CI_IMAGE
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - make run-repo-ci-precommit-all
    - git diff --exit-code HEAD

test:
  image: $CI_IMAGE
  stage: test
  needs: []
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  cache:
    - key:
        files:
          - go.sum
      paths:
        - .cache/go-mod
        - .cache/go-build
  script:
    - make test

release:
  stage: release
  image: $CI_IMAGE
  needs: []
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  variables:
    GITLAB_TOKEN: $CI_JOB_TOKEN
  script:
    - NEXT=$(sh ci/next-version.sh)
    - echo "releasing $NEXT"
    - glab release create "$NEXT" --name "get-term-open-files-with $NEXT" --ref "$CI_COMMIT_SHA" --notes "get-term-open-files-with $NEXT"

goreleaser:
  stage: release
  image: $CI_IMAGE
  needs: []
  rules:
    - if: $CI_COMMIT_TAG
  variables:
    GITLAB_TOKEN: $CI_JOB_TOKEN
  cache:
    - key:
        files:
          - go.sum
      paths:
        - .cache/go-mod
        - .cache/go-build
  script:
    - goreleaser release --clean
##[<] 🤖🤖
