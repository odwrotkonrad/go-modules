# [>] 🤖🤖
context:
  command: get-os-open-files-with
cases:
  - name: runShouldPrintSingleAppSingleRoleLine
    input:
      args: [config: testdata/fixture/run/single_app_single_role.yml]
    expected:
      files: testdata/fixture/run/single_app_single_role.expected.txt
  - name: runShouldPrintLinePerRoleForOneApp
    input:
      args: [config: testdata/fixture/run/one_app_multiple_roles.yml]
    expected:
      files: testdata/fixture/run/one_app_multiple_roles.expected.txt
  - name: runShouldPrintMultipleAppsInConfigOrder
    input:
      args: [config: testdata/fixture/run/multiple_apps.yml]
    expected:
      files: testdata/fixture/run/multiple_apps.expected.txt
  - name: runShouldPrintNothingForEmptyMapping
    input:
      args: [config: testdata/fixture/run/empty_config.yml]
    expected:
      files: testdata/fixture/run/empty.expected.txt
  - name: runShouldPrintNothingForAppWithEmptyRoles
    input:
      args: [config: testdata/fixture/run/app_with_empty_role_list.yml]
    expected:
      files: testdata/fixture/run/empty.expected.txt
  - name: runShouldPrintNothingForNullConfig
    input:
      args: [config: testdata/fixture/run/null_config.yml]
    expected:
      files: testdata/fixture/run/empty.expected.txt
  - name: runShouldExit12WhenTopLevelNotMapping
    input:
      args: [config: testdata/fixture/run/top_level_list.yml]
    expected:
      exitCode: 12
      errorOutput: [top level must be a mapping]
  - name: runShouldExit12WhenUtisNotList
    input:
      args: [config: testdata/fixture/run/utis_not_list.yml]
    expected:
      exitCode: 12
      errorOutput: [must be a list]
  - name: runShouldExit13WhenConfigMissing
    input:
      args: []
    expected:
      exitCode: 13
  - name: runShouldExit12OnInvalidYamlSyntax
    input:
      args: [config: testdata/fixture/run/invalid_syntax.yml]
    expected:
      exitCode: 12
      errorOutput: [invalid config]
  - name: runShouldExit12WhenRolesNull
    input:
      args: [config: testdata/fixture/run/invalid_null_roles.yml]
    expected:
      exitCode: 12
  - name: runShouldExit11OnTwoArgs
    context:
      command: get-os-open-files-with one two
    input:
      args: [config: testdata/fixture/run/empty_config.yml]
    expected:
      exitCode: 11
  - name: runShouldExit11OnThreeArgs
    context:
      command: get-os-open-files-with one two three
    input:
      args: [config: testdata/fixture/run/empty_config.yml]
    expected:
      exitCode: 11
# [<] 🤖🤖
