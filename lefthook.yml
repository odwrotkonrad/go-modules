extends:
  - ~/.config/lefthook/lefthook.yml

pre-commit:
  jobs:
    - name: golangci-fmt
      glob: "*.go"
      run: golangci-lint fmt {staged_files} && git add {staged_files}
    - name: gomodtidy
      glob: "{go.mod,go.sum,*.go}"
      run: for m in che get-os-open-files-with get-term-open-files-with lib; do (cd $m && go mod tidy -diff) || exit 1; done
    - name: golangci-lint
      glob: "*.go"
      run: make lint
    - name: docsgen
      env:
        MK_DRY_RUN: ""
      run: make render-docs render-templates && { git diff --exit-code || { echo "regeneration changed tracked files (diff above), restage and re-commit"; exit 1; } }
