##[>] 🤖🤖
workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - warm
  - verify
  - test
  - release
  - publish
  - make-docs

variables:
  CI_IMAGE: registry.gitlab.com/konradodwrot/infra/oci-images/ci-linux:latest
  GOMODCACHE: $CI_PROJECT_DIR/.cache/go-mod
  GOCACHE: $CI_PROJECT_DIR/.cache/go-build
  CC: clang

warm-go:
  stage: warm
  image: $CI_IMAGE
  needs: []
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  cache:
    - key: go-mod
      paths:
        - .cache/go-mod
      policy: pull-push
    - key: go-build
      paths:
        - .cache/go-build
      policy: pull-push
  script:
    - for m in lib che get-os-open-files-with get-term-open-files-with; do (cd $m && echo "## download $m" && go mod download all) || exit 1; done
    - for m in lib che; do (cd $m && echo "## build $m" && go build -v ./...) || exit 1; done

warm-go-mod-release:
  stage: warm
  image: $CI_IMAGE
  rules:
    - if: $CI_COMMIT_TAG =~ /^che\/v/
      variables:
        MODULE: che
    - if: $CI_COMMIT_TAG =~ /^get-os-open-files-with\/v/
      variables:
        MODULE: get-os-open-files-with
    - if: $CI_COMMIT_TAG =~ /^get-term-open-files-with\/v/
      variables:
        MODULE: get-term-open-files-with
  cache:
    - key: go-mod-$MODULE
      paths:
        - .cache/go-mod
      policy: pull-push
  script:
    - (cd $MODULE && go mod download all)

verify-precommit-all:
  stage: verify
  image: $CI_IMAGE
  needs: [warm-go]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  variables:
    LEFTHOOK_OUTPUT: meta,summary,execution,execution_info,execution_out
  cache:
    - key: go-mod
      paths:
        - .cache/go-mod
      policy: pull
    - key: go-build
      paths:
        - .cache/go-build
      policy: pull
  script:
    - make run-repo-ci-precommit-all
    - git diff --exit-code HEAD

.test-module:
  image: $CI_IMAGE
  stage: test
  needs: [warm-go]
  cache:
    - key: go-mod
      paths:
        - .cache/go-mod
      policy: pull
    - key: go-build
      paths:
        - .cache/go-build
      policy: pull
  script:
    - make -C $MODULE test-cover
  coverage: '/total:\s+\(statements\)\s+\d+\.\d+%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: $MODULE/coverage.xml

test-che:
  extends: .test-module
  variables:
    MODULE: che
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes: [che/**/*, lib/**/*, go.work, .gitlab-ci.yml]
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes: [che/**/*, lib/**/*, go.work, .gitlab-ci.yml]

test-get-os-open-files-with:
  extends: .test-module
  variables:
    MODULE: get-os-open-files-with
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes: [get-os-open-files-with/**/*, lib/**/*, go.work, .gitlab-ci.yml]
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes: [get-os-open-files-with/**/*, lib/**/*, go.work, .gitlab-ci.yml]

test-get-term-open-files-with:
  extends: .test-module
  variables:
    MODULE: get-term-open-files-with
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes: [get-term-open-files-with/**/*, lib/**/*, go.work, .gitlab-ci.yml]
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes: [get-term-open-files-with/**/*, lib/**/*, go.work, .gitlab-ci.yml]

test-lib:
  extends: .test-module
  variables:
    MODULE: lib
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes: [lib/**/*, go.work, .gitlab-ci.yml]
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes: [lib/**/*, go.work, .gitlab-ci.yml]

.release-module:
  stage: release
  image: $CI_IMAGE
  variables:
    GITLAB_TOKEN: $CI_JOB_TOKEN
    GIT_DEPTH: "0"
  script:
    - make create-tag MODULE=$MODULE BRANCH="$CI_COMMIT_BRANCH" REF="$CI_COMMIT_SHA" DEFAULT_BRANCH="$CI_DEFAULT_BRANCH"

release-che:
  extends: .release-module
  variables:
    MODULE: che
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes: [che/**/*]

release-get-os-open-files-with:
  extends: .release-module
  variables:
    MODULE: get-os-open-files-with
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes: [get-os-open-files-with/**/*]

release-get-term-open-files-with:
  extends: .release-module
  variables:
    MODULE: get-term-open-files-with
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes: [get-term-open-files-with/**/*]

release-lib:
  extends: .release-module
  variables:
    MODULE: lib
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes: [lib/**/*]

.pages-build:
  image:
    name: squidfunk/mkdocs-material:9
    entrypoint: [""]
  needs: []
  script:
    - mkdir -p che/docs/assets/data
    - cp che/assets/data/che.schema.json che/docs/assets/data/
    - sed -i 's|(\.\./assets/data/che.schema.json)|(assets/data/che.schema.json)|g' che/docs/spec.md
    - printf '# che\n' > che/docs/index.md
    - tail -n +2 che/assets/docs-agents/purpose.md >> che/docs/index.md
    - printf '# License\n\n```\n' > che/docs/license.md
    - cat LICENSE >> che/docs/license.md
    - printf '```\n' >> che/docs/license.md
    - cd che && mkdocs build --site-dir ../public
    - echo "docs preview -> https://konradodwrot.gitlab.io/-/go-modules/-/jobs/$CI_JOB_ID/artifacts/public/index.html"
  artifacts:
    paths:
      - public

pages-publish:
  extends: .pages-build
  stage: make-docs
  pages: true
  needs: [release-che]
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes: [che/**/*]

pages-preview:
  extends: .pages-build
  stage: make-docs
  needs: []
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  variables:
    DOCS_DIR_URLS: "false"
  environment:
    name: docs-preview/$CI_MERGE_REQUEST_IID
    url: https://konradodwrot.gitlab.io/-/go-modules/-/jobs/$CI_JOB_ID/artifacts/public/index.html
  artifacts:
    expose_as: docs preview
    paths:
      - public
    expire_in: 1 week

goreleaser-darwin-che:
  stage: release
  tags:
    - saas-macos-medium-m1
  image: macos-26-xcode-26
  rules:
    - if: $CI_COMMIT_TAG =~ /^che\/v/
  variables:
    GOPATH: $CI_PROJECT_DIR/.cache/go-path
    GO_VERSION: 1.26.4
    GO_SHA256_DARWIN_ARM64: b62ad2b6d7d2464f12a5bcad7ff47f19d08325773b5efd21610e445a05a9bf53
    GORELEASER_VERSION: 2.16.0
    GORELEASER_SHA256_DARWIN_ARM64: 8f6898256f35531165d90f2db581c5ee0d32bda83ebc25ac231ff5bdb9d2071a
  cache:
    - key: go-mod-che
      paths:
        - .cache/go-mod
      policy: pull
    - key: go-build-che-darwin
      paths:
        - .cache/go-build
      policy: pull-push
  before_script:
    - curl -fsSL -o /tmp/go.tar.gz "https://go.dev/dl/go${GO_VERSION}.darwin-arm64.tar.gz"
    - echo "$GO_SHA256_DARWIN_ARM64  /tmp/go.tar.gz" | shasum -a 256 -c -
    - tar -C "$HOME" -xzf /tmp/go.tar.gz
    - curl -fsSL -o /tmp/goreleaser.tar.gz "https://github.com/goreleaser/goreleaser/releases/download/v${GORELEASER_VERSION}/goreleaser_Darwin_arm64.tar.gz"
    - echo "$GORELEASER_SHA256_DARWIN_ARM64  /tmp/goreleaser.tar.gz" | shasum -a 256 -c -
    - mkdir -p "$HOME/bin"
    - tar -C "$HOME/bin" -xzf /tmp/goreleaser.tar.gz goreleaser
    - export PATH="$HOME/go/bin:$HOME/bin:$PATH"
    - go version
    - goreleaser --version
  script:
    - export MODULE_VERSION="${CI_COMMIT_TAG#che/v}"
    - cd che && goreleaser release --verbose --snapshot --clean -f .goreleaser.darwin.yaml
  artifacts:
    paths:
      - che/darwin-dist/*.tar.gz
    expire_in: 1 day

goreleaser-linux-che:
  stage: release
  image: $CI_IMAGE
  rules:
    - if: $CI_COMMIT_TAG =~ /^che\/v/
  parallel:
    matrix:
      - ARCH: [amd64, arm64]
  cache:
    - key: go-mod-che
      paths:
        - .cache/go-mod
      policy: pull
    - key: go-build-che-zig-$ARCH
      paths:
        - .cache/go-build
      policy: pull-push
  script:
    - export MODULE_VERSION="${CI_COMMIT_TAG#che/v}"
    - cd che
    - yq '.builds[].goarch = [strenv(ARCH)]' .goreleaser.yaml > ".goreleaser.linux-$ARCH.yaml"
    - goreleaser release --verbose --snapshot --clean -f ".goreleaser.linux-$ARCH.yaml"
  artifacts:
    paths:
      - che/dist/*.tar.gz
    expire_in: 1 day

publish-che:
  stage: publish
  image: $CI_IMAGE
  needs:
    - goreleaser-darwin-che
    - goreleaser-linux-che
  rules:
    - if: $CI_COMMIT_TAG =~ /^che\/v/
  variables:
    PUBLISH_PREBUILT: "1"
  script:
    - make publish

publish-get-os-open-files-with:
  stage: publish
  image: $CI_IMAGE
  rules:
    - if: $CI_COMMIT_TAG =~ /^get-os-open-files-with\/v/
  cache:
    - key: go-mod-get-os-open-files-with
      paths:
        - .cache/go-mod
      policy: pull
    - key: go-build-get-os-open-files-with-publish
      paths:
        - .cache/go-build
      policy: pull-push
  script:
    - make publish

publish-get-term-open-files-with:
  stage: publish
  image: $CI_IMAGE
  rules:
    - if: $CI_COMMIT_TAG =~ /^get-term-open-files-with\/v/
  cache:
    - key: go-mod-get-term-open-files-with
      paths:
        - .cache/go-mod
      policy: pull
    - key: go-build-get-term-open-files-with-publish
      paths:
        - .cache/go-build
      policy: pull-push
  script:
    - make publish
